<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com https://fonts.googleapis.com https://www.gstatic.com https://agakzhlswzimjylewvcg.supabase.co wss://agakzhlswzimjylewvcg.supabase.co; img-src 'self' data: https: blob:; media-src 'self' https:;">
    <title>小羽书屋 · 数字化馆藏管理</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif SC', 'PingFang SC', serif; }
        .animate-in { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .book-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(44,24,16,0.1); }
    </style>
</head>
<body class="bg-[#faf6f0] text-[#2c1810]">
    <div id="root"></div>

    <script type="text/babel">
        const SUPABASE_URL = 'https://agakzhlswzimjylewvcg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YzYzzdOVSQzaNr1s3KjtLQ_KyHXfs5P';
        const supabase = (window.supabasejs || window.supabase).createClient(SUPABASE_URL, SUPABASE_KEY);

        const { useState, useEffect, useMemo, useRef, createElement } = React;

        // ======================== Icon 组件 ========================
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = window.lucide && window.lucide.icons;
            if (!icons || !icons[name]) return null;
            const attrs = { width: size, height: size, stroke: "currentColor", fill: "none",
                "stroke-width": 1.5, "stroke-linecap": "round", "stroke-linejoin": "round",
                className: `lucide lucide-${name} ${className}` };
            const children = icons[name].map((tag, i) => createElement(tag[0], { key: i, ...(tag[1] || {}) }));
            return createElement("svg", attrs, ...children);
        };

        // ======================== 通知配置 ========================
        const NOTIFY_CONFIG = {
            enabled: true,
            type: 'serverchan',
            serverChanKey: 'SCT345313Tdstay9vuHPBIOHLGy4gQsbel',
            feishuWebhook: 'https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_TOKEN',
            customWebhook: ''
        };

        const READER_TYPES = {
            'UNDERGRAD': { label: '本科生', limit: 10 },
            'POSTGRAD': { label: '研究生', limit: 20 },
            'STAFF': { label: '教职工', limit: 30 },
            'ADMIN': { label: '管理员', limit: 99 },
            'GUEST': { label: '游客', limit: 0 }
        };

        async function sendNewReaderNotification(reader) {
            if (!NOTIFY_CONFIG.enabled) return;
            const title = '📚 新读者注册通知';
            const content =
                `读者姓名：${reader.name}\n` +
                `手机号：${reader.account}\n` +
                `院系/部门：${reader.department}\n` +
                `读者类型：${READER_TYPES[reader.readerType]?.label || '未知'}\n` +
                `注册时间：${new Date().toLocaleString('zh-CN')}`;
            try {
                if (NOTIFY_CONFIG.type === 'serverchan') {
                    await fetch(`https://sctapi.ftqq.com/${NOTIFY_CONFIG.serverChanKey}.send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `title=${encodeURIComponent(title)}&desp=${encodeURIComponent(content)}`
                    });
                } else if (NOTIFY_CONFIG.type === 'feishu') {
                    await fetch(NOTIFY_CONFIG.feishuWebhook, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ msg_type: 'text', content: { text: title + '\n\n' + content } })
                    });
                } else if (NOTIFY_CONFIG.type === 'custom' && NOTIFY_CONFIG.customWebhook) {
                    await fetch(NOTIFY_CONFIG.customWebhook, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content, reader })
                    });
                }
            } catch (e) { console.warn('通知发送失败（不影响注册）:', e); }
        }

        // ======================== buildUser ========================
        function buildUser(session) {
            if (!session) return null;
            const u = session.user;
            return {
                id: u.id,
                account: u.email,
                email: u.email,
                name: u.user_metadata?.name || u.email?.split('@')[0] || '读者',
                department: u.user_metadata?.department || '未知院系',
                readerType: u.user_metadata?.readerType || 'UNDERGRAD',
                role: u.user_metadata?.role || 'READER',
                status: 'ACTIVE',
                phone: u.phone || u.user_metadata?.phone || ''
            };
        }

        // ======================== App ========================
        function App() {
            const [user, setUser] = useState(null);
            const [authReady, setAuthReady] = useState(false);
            const [db, setDb] = useState({ users: [], books: [], borrowings: [] });

            // Supabase Auth 监听（兼容管理员本地 Session 与手机验证码登录）
            useEffect(() => {
                let cancelled = false;
                const localSession = localStorage.getItem("USER_SESSION");
                // 安全超时：5 秒后无论结果如何都结束 loading
                const safetyTimer = setTimeout(() => {
                    if (!cancelled) {
                        if (localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                setUser(parsed);
                            } catch(e) { localStorage.removeItem("USER_SESSION"); }
                        }
                        setAuthReady(true);
                    }
                }, 5000);

                try {
                    supabase.auth.getSession().then(({ data: { session } }) => {
                        if (cancelled) return;
                        clearTimeout(safetyTimer);
                        const supabaseUser = buildUser(session);
                        if (supabaseUser) {
                            setUser(supabaseUser);
                        } else if (localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                if ((parsed.role === 'ADMIN' && parsed.id === '18723992791') || parsed.is_admin === true) {
                                    setUser(parsed);
                                }
                            } catch(e) { localStorage.removeItem("USER_SESSION"); }
                        }
                        setAuthReady(true);
                    }).catch(() => {
                        if (cancelled) return;
                        clearTimeout(safetyTimer);
                        if (localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                setUser(parsed);
                            } catch(e) { localStorage.removeItem("USER_SESSION"); }
                        }
                        setAuthReady(true);
                    });
                } catch(e) {
                    clearTimeout(safetyTimer);
                    if (localSession) {
                        try {
                            const parsed = JSON.parse(localSession);
                            setUser(parsed);
                        } catch(_) { localStorage.removeItem("USER_SESSION"); }
                    }
                    setAuthReady(true);
                }

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    const u = buildUser(session);
                    if (u) {
                        setUser(u);
                        localStorage.setItem("USER_SESSION", JSON.stringify(u));
                    } else {
                        const local = localStorage.getItem("USER_SESSION");
                        if (local) {
                            try {
                                const parsed = JSON.parse(local);
                                if ((parsed.role === 'ADMIN' && parsed.id === '18723992791') || parsed.is_admin === true) {
                                    return;
                                }
                            } catch(e) {}
                        }
                        setUser(null);
                        localStorage.removeItem("USER_SESSION");
                    }
                });
                return () => {
                    cancelled = true;
                    clearTimeout(safetyTimer);
                    subscription.unsubscribe();
                };
            }, []);

            // 加载图书
            useEffect(() => {
                if (!authReady) return;
                const fetchBooks = async () => {
                    const { data, error } = await supabase.from('books').select('*').order('created_at', { ascending: false });
                    if (!error && data) {
                        if (data.length === 0) {
                            // 自动 seed
                            try {
                                const resp = await fetch('data.json');
                                if (resp.ok) {
                                    const seedData = await resp.json();
                                    const { error: seedErr } = await supabase.from('books').insert(
                                        seedData.map(({ id, created_at, ...b }) => b)
                                    );
                                    if (!seedErr) {
                                        const { data: fresh } = await supabase.from('books').select('*').order('created_at', { ascending: false });
                                        if (fresh) setDb(prev => ({ ...prev, books: fresh }));
                                        return;
                                    }
                                }
                            } catch (_) {}
                        }
                        setDb(prev => ({ ...prev, books: data }));
                    }
                };
                fetchBooks();
                const channel = supabase.channel('books_realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'books' }, () => fetchBooks())
                    .subscribe();
                return () => { supabase.removeChannel(channel); };
            }, [authReady]);

            // 加载本地借阅记录
            useEffect(() => {
                const saved = localStorage.getItem("THU_LIB_BORROW");
                if (saved) setDb(prev => ({ ...prev, borrowings: JSON.parse(saved) }));
            }, []);
            useEffect(() => {
                if (db.borrowings.length > 0) localStorage.setItem("THU_LIB_BORROW", JSON.stringify(db.borrowings));
            }, [db.borrowings]);

            const logout = async () => {
                await supabase.auth.signOut();
                setUser(null);
                localStorage.removeItem("USER_SESSION");
            };

            const handleGuestLogin = () => {
                const guestToken = 'gt_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 10);
                const guestUser = {
                    id: 'guest_' + Date.now(),
                    account: 'guest',
                    email: '',
                    name: '游客',
                    department: '访客',
                    readerType: 'GUEST',
                    role: 'GUEST',
                    status: 'ACTIVE',
                    phone: '',
                    guest_token: guestToken,
                    is_admin: false
                };
                localStorage.setItem("USER_SESSION", JSON.stringify(guestUser));
                setUser(guestUser);
            };

            if (!authReady) {
                return (
                    <div className="h-screen flex items-center justify-center bg-[#faf6f0]">
                        <div className="text-center">
                            <div className="w-16 h-16 mx-auto mb-5 rounded-full bg-[#b22222] flex items-center justify-center text-white font-black text-xl" style={{ fontFamily: 'serif' }}>書</div>
                            <p className="text-[#8b7355] text-sm">正在叩门…</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {user ? (
                        <Dashboard user={user} db={db} setDb={setDb} onLogout={logout} />
                    ) : (
                        <LoginPage db={db} setDb={setDb} onGuestLogin={handleGuestLogin} onLogin={setUser} />
                    )}
                </div>
            );
        }

        // ======================== 短信发送（调用 Supabase Edge Function） ========================
        async function generateAndSendCode(phone) {
            try {
                const { data, error } = await supabase.functions.invoke('send-sms', {
                    body: { phone: phone.trim().replace(/\s+/g, '') }
                });
                if (error) return { success: false, code: error.message || '短信发送失败' };
                if (data && data.success) return { success: true };
                return { success: false, code: (data && data.error) || '短信发送失败' };
            } catch(e) {
                return { success: false, code: '网络异常，请稍后重试' };
            }
        }

        // 验证码校验（仅查询 Supabase，不涉及短信密钥）
        async function verifySMSCode(phone, code) {
            const { data, error } = await supabase.from('otp_codes')
                .select('*').eq('phone', phone).eq('code', code).maybeSingle();
            if (error || !data) return false;
            if (new Date(data.expires_at) < new Date()) return false;
            await supabase.from('otp_codes').delete().eq('phone', phone);
            return true;
        }

        // ======================== LoginPage ========================
        function LoginPage({ db, setDb, onGuestLogin, onLogin }) {
            const [mode, setMode] = useState('login'); // 'login' | 'register'
            const [adminMode, setAdminMode] = useState(false);
            const [form, setForm] = useState({ phone: '', name: '', dept: '', type: 'UNDERGRAD', pw: '' });
            const [step, setStep] = useState('phone'); // 'phone' | 'code' | 'success'
            const [code, setCode] = useState(['', '', '', '', '', '']);
            const [loading, setLoading] = useState(false);
            const [msg, setMsg] = useState(null);
            const [codeErr, setCodeErr] = useState('');
            const [countdown, setCountdown] = useState(0);
            const [redirecting, setRedirecting] = useState(false);
            const otpRefs = [useRef(null), useRef(null), useRef(null), useRef(null), useRef(null), useRef(null)];

            // 倒计时
            useEffect(() => {
                if (countdown > 0) {
                    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
                    return () => clearTimeout(t);
                }
            }, [countdown]);

            const handleSendCode = async () => {
                const phone = form.phone.trim().replace(/\s+/g, '');
                if (!/^1[3-9]\d{9}$/.test(phone)) return setMsg({ type: 'warn', text: '请输入有效的11位手机号' });
                // 管理员拦截
                if (phone === '18723992791' && !adminMode) return setMsg({ type: 'err', text: '该手机号为受保护的系统账号' });

                setLoading(true); setMsg(null);
                try {
                    const result = await generateAndSendCode(phone);
                    if (result.success) {
                        setMsg({ type: 'ok', text: '验证码已发送至 ' + phone + '，5 分钟内有效' });
                        setStep('code');
                        setCountdown(60);
                        setTimeout(() => otpRefs[0].current?.focus(), 150);
                    } else {
                        setMsg({ type: 'err', text: '发送失败：' + (result.code || '请检查手机号或稍后重试') });
                    }
                } catch(e) {
                    setMsg({ type: 'err', text: '发送异常：' + e.message });
                }
                setLoading(false);
            };

            const handleResend = async () => {
                if (countdown > 0) return;
                setCode(['', '', '', '', '', '']); setCodeErr('');
                await handleSendCode();
            };

            const handleCodeChange = (val, idx) => {
                const v = val.replace(/\D/g, '').slice(0, 1);
                const next = [...code]; next[idx] = v;
                setCode(next); setCodeErr('');
                if (v && idx < 5) otpRefs[idx + 1].current?.focus();
            };
            const handleCodeKey = (e, idx) => {
                if (e.key === 'Backspace' && !code[idx] && idx > 0) otpRefs[idx - 1].current?.focus();
            };

            // 登录验证
            const handleVerifyLogin = async () => {
                const codeStr = code.join('');
                if (codeStr.length !== 6) return setCodeErr('请输入完整 6 位验证码');
                setLoading(true); setCodeErr('');
                const phone = form.phone.trim();

                const valid = await verifySMSCode(phone, codeStr);
                if (!valid) { setCodeErr('验证码错误或已过期，请重新获取'); setLoading(false); return; }

                // 查找是否已注册
                const { data: existing } = await supabase.from('profiles').select('*').eq('phone', phone).maybeSingle();
                if (existing) {
                    const sessionUser = {
                        id: existing.id || ('user_' + phone),
                        account: phone,
                        email: existing.email || '',
                        name: existing.name || '读者' + phone.slice(-4),
                        department: existing.department || '未知院系',
                        readerType: existing.reader_type || 'UNDERGRAD',
                        role: existing.role || 'READER',
                        status: existing.status || 'ACTIVE',
                        phone: phone,
                        is_admin: existing.is_admin || false
                    };
                    localStorage.setItem("USER_SESSION", JSON.stringify(sessionUser));
                    setRedirecting(true);
                    setTimeout(() => onLogin(sessionUser), 300);
                    return;
                }
                // 未注册 → 自动创建基础账号
                const autoUser = {
                    id: 'phone_' + Date.now(),
                    account: phone,
                    email: '',
                    name: '读者' + phone.slice(-4),
                    department: '未知院系',
                    readerType: 'UNDERGRAD',
                    role: 'READER',
                    status: 'ACTIVE',
                    phone: phone,
                    is_admin: false
                };
                await supabase.from('profiles').upsert({
                    id: autoUser.id,
                    phone: phone,
                    name: autoUser.name,
                    department: autoUser.department,
                    reader_type: autoUser.readerType,
                    role: autoUser.role,
                    status: autoUser.status,
                    updated_at: new Date().toISOString()
                });
                localStorage.setItem("USER_SESSION", JSON.stringify(autoUser));
                setRedirecting(true);
                setTimeout(() => onLogin(autoUser), 300);
            };

            // 注册验证
            const handleVerifyRegister = async () => {
                const codeStr = code.join('');
                if (codeStr.length !== 6) return setCodeErr('请输入完整 6 位验证码');
                if (!form.name.trim()) return setCodeErr('请先填写姓名后返回获取验证码');
                setLoading(true); setCodeErr('');
                const phone = form.phone.trim();

                // 检查是否已注册
                const { data: dup } = await supabase.from('profiles').select('id').eq('phone', phone).maybeSingle();
                if (dup) { setCodeErr('该手机号已注册，请直接登录'); setLoading(false); return; }

                const valid = await verifySMSCode(phone, codeStr);
                if (!valid) { setCodeErr('验证码错误或已过期，请重新获取'); setLoading(false); return; }

                // 创建用户
                const newUser = {
                    id: 'phone_' + Date.now(),
                    account: phone,
                    email: '',
                    name: form.name.trim(),
                    department: form.dept.trim() || '未知院系',
                    readerType: form.type,
                    role: 'READER',
                    status: 'ACTIVE',
                    phone: phone,
                    is_admin: false
                };
                await supabase.from('profiles').upsert({
                    id: newUser.id,
                    phone: phone,
                    name: newUser.name,
                    department: newUser.department,
                    reader_type: newUser.readerType,
                    role: newUser.role,
                    status: newUser.status,
                    updated_at: new Date().toISOString()
                });

                sendNewReaderNotification({ name: newUser.name, account: phone, department: newUser.department, readerType: newUser.readerType });
                setStep('success');
                setMsg({ type: 'ok', text: '注册成功！正在入阁…' });
                localStorage.setItem("USER_SESSION", JSON.stringify(newUser));
                setTimeout(() => { onLogin(newUser); }, 1500);
            };

            // 管理员登录
            const handleAdminLogin = () => {
                const phone = form.phone.trim();
                const pw = form.pw;
                if (!phone || !pw) return setMsg({ type: 'warn', text: '请填写手机号和密码' });
                if (phone === '18723992791' && pw === 'rqy18723992791') {
                    const adminUser = {
                        id: '18723992791',
                        account: '18723992791',
                        email: 'admin@internal',
                        name: '系统管理员',
                        department: '图书馆',
                        readerType: 'ADMIN',
                        role: 'ADMIN',
                        status: 'ACTIVE',
                        phone: '18723992791',
                        is_admin: true
                    };
                    localStorage.setItem("USER_SESSION", JSON.stringify(adminUser));
                    setRedirecting(true);
                    setTimeout(() => onLogin(adminUser), 300);
                } else {
                    setMsg({ type: 'err', text: '管理员账号或密码错误' });
                }
            };

            const resetForm = (newMode) => {
                setMode(newMode); setStep('phone'); setMsg(null); setCodeErr('');
                setCode(['', '', '', '', '', '']); setCountdown(0);
                setForm({ phone: '', name: '', dept: '', type: 'UNDERGRAD', pw: '' });
            };

            const cls = {
                input: 'w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/30 transition-all text-[#2c1810] placeholder-[#b8a99a]',
                btn: 'w-full py-4 rounded-xl font-bold text-white shadow-lg transition-all active:scale-95 disabled:opacity-60 flex items-center justify-center gap-2',
            };
            const accentColor = adminMode ? '#660874' : '#b22222';
            const accentGradient = adminMode
                ? 'bg-gradient-to-r from-[#660874] to-[#4a0656] shadow-[#660874]/20'
                : 'bg-gradient-to-r from-[#b22222] to-[#8b1a1a] shadow-[#b22222]/20';

            return (
                <div className="h-screen flex items-center justify-center bg-[#faf6f0] relative overflow-hidden">
                    {/* 全屏 Loading 遮罩 - 防止跳转前重复点击 */}
                    {redirecting && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-[#faf6f0]/80 backdrop-blur-sm">
                            <div className="text-center">
                                <div className="w-16 h-16 mx-auto mb-5 rounded-full bg-[#b22222] flex items-center justify-center text-white font-black text-xl shadow-lg shadow-[#b22222]/20 animate-pulse" style={{ fontFamily: 'serif' }}>書</div>
                                <p className="text-[#8b7355] text-sm font-medium">执钥中，请稍候…</p>
                            </div>
                        </div>
                    )}
                    <div className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-[0.06]"
                         style={{ backgroundImage: 'radial-gradient(circle at 20% 30%, #2c1810 1px, transparent 1px), radial-gradient(circle at 80% 70%, #2c1810 1px, transparent 1px)', backgroundSize: '60px 60px' }} />
                    <div className="absolute top-[-15%] left-[-10%] w-[55%] h-[55%] bg-[#8b4513] blur-[150px] rounded-full opacity-[0.06]" />
                    <div className="absolute bottom-[-15%] right-[-10%] w-[55%] h-[55%] bg-[#2c1810] blur-[150px] rounded-full opacity-[0.04]" />

                    <div className="w-[90%] max-w-[440px] p-6 sm:p-10 bg-white rounded-[3rem] shadow-2xl shadow-[#2c1810]/10 relative z-10 animate-in border border-[#d4c5b2]/30">
                        <div className="text-center mb-10">
                            <div className={`w-16 h-16 mx-auto mb-5 rounded-full flex items-center justify-center text-white font-black text-xl shadow-lg ${adminMode ? 'bg-[#660874] shadow-[#660874]/20' : 'bg-[#b22222] shadow-[#b22222]/20'}`}
                                 style={{ fontFamily: 'serif' }}>書</div>
                            <h1 className="text-2xl font-black tracking-widest text-[#2c1810]" style={{ fontFamily: 'serif' }}>小羽书屋</h1>
                            {adminMode && <p className="text-[11px] font-bold text-[#660874] tracking-[0.2em] mt-1">清华大学 · 馆藏管理系统</p>}
                            <p className="text-[#8b7355] text-xs mt-2 tracking-wider">
                                {step === 'success' ? '验印通过 · 即将入阁'
                                    : step === 'code' ? '验印 · 对证入阁'
                                    : mode === 'login' ? (adminMode ? '馆长 · 执钥入阁' : '叩门 · 入阁览卷')
                                    : '投帖 · 问道登门'}
                            </p>
                        </div>

                        {msg && (
                            <div className={`mb-5 p-4 rounded-2xl text-sm font-medium ${
                                msg.type === 'ok' ? 'bg-[#f0f7f0] text-[#2d5a27] border border-[#c8e6c9]' :
                                msg.type === 'err' ? 'bg-[#fef2f2] text-[#991b1b] border border-[#fecaca]' :
                                'bg-[#fefce8] text-[#854d0e] border border-[#fef08a]'}`}>
                                {msg.text}
                            </div>
                        )}

                        {step === 'success' ? (
                            <div className="text-center space-y-5 py-6">
                                <div className="text-4xl">📜</div>
                                <p className="text-[#2c1810] font-bold text-lg" style={{ fontFamily: 'serif' }}>名帖已投，验印通过</p>
                                <p className="text-sm text-[#8b7355] leading-relaxed">正在为您打开阁门…</p>
                            </div>
                        ) : step === 'code' ? (
                            <div className="space-y-6">
                                <p className="text-center text-sm text-[#8b7355] leading-relaxed">
                                    短信已发送至<br /><span className="font-bold text-[#2c1810]">{form.phone}</span><br />请输入 6 位验证码
                                </p>
                                <div className="flex justify-center gap-2.5">
                                    {code.map((d, i) => (
                                        <input key={i} ref={otpRefs[i]} value={d}
                                               onChange={e => handleCodeChange(e.target.value, i)}
                                               onKeyDown={e => handleCodeKey(e, i)} maxLength={1}
                                               className="w-12 h-14 text-center text-xl font-black text-[#2c1810] bg-[#faf6f0] border-2 border-[#d4c5b2] rounded-xl outline-none focus:border-[#b22222] focus:ring-2 ring-[#b22222]/20 transition-all"
                                               style={{ fontFamily: 'monospace' }} />
                                    ))}
                                </div>
                                {codeErr && (
                                    <div className="p-3 bg-[#fef2f2] border border-[#fecaca] text-[#991b1b] rounded-xl text-sm text-center font-medium">{codeErr}</div>
                                )}
                                <button onClick={mode === 'login' ? handleVerifyLogin : handleVerifyRegister} disabled={loading || redirecting}
                                        className={cls.btn + ' bg-gradient-to-r from-[#2c1810] to-[#4a2c1a] shadow-[#2c1810]/20'}>
                                    {loading ? <><Icon name="loader-2" size={18} className="animate-spin" /> 验证中…</> : (mode === 'login' ? '验证并登录' : '验证并完成注册')}
                                </button>
                                <div className="flex justify-between text-xs">
                                    <button onClick={handleResend} disabled={countdown > 0}
                                            className={`transition-colors font-bold ${countdown > 0 ? 'text-[#b8a99a] cursor-not-allowed' : 'text-[#8b7355] hover:text-[#b22222]'}`}>
                                        {countdown > 0 ? `${countdown}s 后重新发送` : '⟳ 重新发送'}
                                    </button>
                                    <button onClick={() => { setStep('phone'); setMsg(null); setCode(['', '', '', '', '', '']); setCodeErr(''); setCountdown(0); }}
                                            className="text-[#8b7355] hover:text-[#2c1810] transition-colors font-bold">← 修改手机号</button>
                                </div>
                            </div>
                        ) : mode === 'login' ? (
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">手机号</label>
                                    <input value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })}
                                           className={cls.input} placeholder={adminMode ? "管理员手机号" : "请输入11位手机号"} maxLength={11} />
                                </div>
                                {adminMode && (
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">密码</label>
                                        <input type="password" value={form.pw} onChange={e => setForm({ ...form, pw: e.target.value })}
                                               className={cls.input} placeholder="请输入管理员密码" />
                                    </div>
                                )}
                                {adminMode ? (
                                    <button onClick={handleAdminLogin} disabled={loading || redirecting}
                                            className={cls.btn + ' bg-gradient-to-r from-[#660874] to-[#4a0656] shadow-[#660874]/20 mt-6'}>
                                        {loading ? <><Icon name="loader-2" size={18} className="animate-spin" /> 验证中…</> : '馆长执钥入阁'}
                                    </button>
                                ) : (
                                    <button onClick={handleSendCode} disabled={loading}
                                            className={cls.btn + ' bg-gradient-to-r from-[#2c1810] to-[#4a2c1a] shadow-[#2c1810]/20 mt-6'}>
                                        {loading ? <><Icon name="loader-2" size={18} className="animate-spin" /> 发送中…</> : '获取短信验证码'}
                                    </button>
                                )}
                                <p className="text-center text-sm text-[#8b7355] pt-2 cursor-pointer hover:text-[#2c1810] transition-colors"
                                   onClick={() => resetForm('register')}>
                                    暂无账号？点此注册小羽书屋账号 →
                                </p>
                                {!adminMode && (
                                    <button onClick={onGuestLogin}
                                            className="w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 bg-[#d4c5b2] border-2 border-[#8b7355] text-[#2c1810] mt-2">
                                        <Icon name="coffee" size={18} /> 跳过登录 / 先去逛逛
                                    </button>
                                )}
                                <p className={`text-center text-[10px] pt-3 cursor-pointer hover:opacity-80 transition-opacity font-bold tracking-wider ${adminMode ? 'text-[#660874]' : 'text-[#b8a99a]'}`}
                                   onClick={() => { setAdminMode(!adminMode); setMsg(null); setForm({ ...form, pw: '' }); }}>
                                    {adminMode ? '← 返回普通读者登录' : '🔑 管理员入口'}
                                </p>
                            </div>
                        ) : (
                            <div className="space-y-3 max-h-[420px] overflow-y-auto no-scrollbar pr-2">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">手机号 *</label>
                                    <input value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })}
                                           className={cls.input} placeholder="请输入11位手机号" maxLength={11} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">姓名 *</label>
                                    <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })}
                                           className={cls.input} placeholder="请输入您的姓名" />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">身份</label>
                                        <select value={form.type} onChange={e => setForm({ ...form, type: e.target.value })}
                                                className={cls.input}>
                                            <option value="UNDERGRAD">本科生</option>
                                            <option value="POSTGRAD">研究生</option>
                                            <option value="STAFF">教职工</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">院系</label>
                                        <input value={form.dept} onChange={e => setForm({ ...form, dept: e.target.value })}
                                               className={cls.input} placeholder="如：翰林院" />
                                    </div>
                                </div>
                                <button onClick={handleSendCode} disabled={loading}
                                        className={cls.btn + ' bg-gradient-to-r from-[#b22222] to-[#8b1a1a] shadow-[#b22222]/20 mt-4'}>
                                    {loading ? <><Icon name="loader-2" size={18} className="animate-spin" /> 发送中…</> : '获取短信验证码'}
                                </button>
                                <p className="text-center text-sm text-[#8b7355] pt-2 pb-2 cursor-pointer hover:text-[#2c1810] transition-colors"
                                   onClick={() => resetForm('login')}>
                                    ← 已有名帖，返回叩门
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ======================== Dashboard ========================
        function Dashboard({ user, db, setDb, onLogout }) {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [view, setView] = useState(user.is_admin ? 'admin_home' : 'reader_home');
            const [search, setSearch] = useState('');
            const filteredBooks = db.books.filter(b => b.title.includes(search) || b.isbn.includes(search) || (b.author && b.author.includes(search)));

            const borrowBook = (book) => {
                if (user.role === 'GUEST') return alert("借阅功能需要登录账号，请先登录或注册。");
                if (user.status !== 'ACTIVE') return alert("您的账号状态异常，暂无借阅权限！");
                if (book.available <= 0) return alert("暂无库存，请留意归还动态");
                const currentCount = db.borrowings.filter(b => b.userId === user.id && b.status === 'BORROWED').length;
                const limit = READER_TYPES[user.readerType || 'UNDERGRAD']?.limit || 5;
                if (currentCount >= limit) return alert(`您当前的借阅额度为 ${limit} 本，已达上限！`);
                const newBooks = db.books.map(b => b.id === book.id ? { ...b, available: b.available - 1 } : b);
                const dueDate = new Date(); dueDate.setDate(dueDate.getDate() + 30);
                const newBorrow = {
                    id: Date.now().toString(), userId: user.id, bookId: book.id,
                    bookTitle: book.title, date: new Date().toLocaleDateString(),
                    due: dueDate.toLocaleDateString(), status: 'BORROWED'
                };
                setDb({ ...db, books: newBooks, borrowings: [newBorrow, ...db.borrowings] });
                alert("借阅成功！请在 30 日内归还。");
            };

            const deleteBook = async (bookId) => {
                if (!confirm("确定要下架并删除这本图书吗？")) return;
                const { error } = await supabase.from('books').delete().eq('id', bookId);
                if (error) alert("删除失败：" + error.message);
            };

            return (
                <div className="flex h-screen overflow-hidden w-full max-w-full relative">
                    {/* Mobile hamburger */}
                    <button onClick={() => setSidebarOpen(true)}
                            className="lg:hidden fixed top-4 left-4 z-30 w-10 h-10 bg-white rounded-xl shadow-md border border-[#d4c5b2]/30 flex items-center justify-center text-[#2c1810] hover:bg-[#faf6f0] transition-colors">
                        <Icon name="menu" size={20} />
                    </button>

                    {/* Mobile drawer backdrop */}
                    {sidebarOpen && (
                        <div className="fixed inset-0 bg-black/40 z-20 lg:hidden" onClick={() => setSidebarOpen(false)} />
                    )}

                    {/* Sidebar - drawer on mobile, static sidebar on lg+ */}
                    <aside className={`w-72 border-r border-[#d4c5b2]/30 bg-white p-8 flex flex-col z-20 shadow-sm fixed inset-y-0 left-0 transition-transform duration-300 lg:relative lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-12 h-12 rounded-xl bg-[#b22222] flex items-center justify-center text-white font-black text-lg shadow-lg shadow-[#b22222]/20"
                                 style={{ fontFamily: 'serif' }}>書</div>
                            <h2 className="text-xl font-black tracking-tighter text-[#2c1810]" style={{ fontFamily: 'serif' }}>小羽书屋</h2>
                            <button onClick={() => setSidebarOpen(false)} className="lg:hidden ml-auto p-2 text-[#8b7355] hover:bg-[#faf6f0] rounded-full transition-colors">
                                <Icon name="x" size={20} />
                            </button>
                        </div>

                        <div className="flex-1 space-y-1.5">
                            <NavBtn icon="home" label="系统首页" active={view.includes('home')}
                                    onClick={() => { setView(user.is_admin ? 'admin_home' : 'reader_home'); setSidebarOpen(false); }} />
                            <NavBtn icon="search" label="馆藏检索" active={view === 'search'} onClick={() => { setView('search'); setSidebarOpen(false); }} />
                            <NavBtn icon="bookmark" label="我的借阅" active={view === 'my'} onClick={() => { setView('my'); setSidebarOpen(false); }} />
                            <NavBtn icon="pen-line" label="书屋评价" active={view === 'eval_form'} onClick={() => { setView('eval_form'); setSidebarOpen(false); }} />
                            {user.is_admin === true && (
                                <div className="mt-8 pt-6 border-t border-[#d4c5b2]/30">
                                    <p className="text-[10px] font-bold text-[#8b7355] uppercase mb-3 px-4 tracking-widest">馆务管理</p>
                                    <NavBtn icon="plus-circle" label="图书入库编目" active={view === 'add'} onClick={() => { setView('add'); setSidebarOpen(false); }} />
                                    <NavBtn icon="users" label="读者信息管理" active={view === 'users'} onClick={() => { setView('users'); setSidebarOpen(false); }} />
                                    <NavBtn icon="messages-square" label="匿名评价管理" active={view === 'eval_admin'} onClick={() => { setView('eval_admin'); setSidebarOpen(false); }} />
                                </div>
                            )}
                        </div>

                        <div className="mt-auto pt-6 border-t border-[#d4c5b2]/30">
                            <div className="flex items-center gap-3 mb-4 px-4 bg-[#faf6f0] p-3 rounded-2xl">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-[#b22222] ${user.role === 'GUEST' ? 'bg-[#8b7355]/10 text-[#8b7355]' : 'bg-[#b22222]/10'}`}
                                     style={{ fontFamily: 'serif' }}>{user.name[0]}</div>
                                <div className="min-w-0">
                                    <p className="text-sm font-bold truncate text-[#2c1810]">{user.name}</p>
                                    <p className="text-[10px] text-[#8b7355] font-bold tracking-tight uppercase">
                                        {user.role === 'GUEST' ? '访客模式 · 仅浏览' : user.is_admin ? '馆长：' + (user.account || '') : (user.phone || user.account || '')}
                                    </p>
                                </div>
                            </div>
                            <button onClick={onLogout}
                                    className={`w-full py-3 rounded-xl text-xs font-bold transition-colors flex items-center justify-center gap-2 ${user.role === 'GUEST' ? 'bg-white border border-[#d4c5b2] text-[#8b7355] hover:bg-[#faf6f0]' : 'bg-white border border-red-100 text-red-500 hover:bg-red-50'}`}>
                                <Icon name={user.role === 'GUEST' ? 'log-in' : 'log-out'} size={14} /> {user.role === 'GUEST' ? '登录 / 注册' : '安全登出'}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden bg-[#faf6f0] p-4 sm:p-8 lg:p-12 max-w-full box-border">
                        {view === 'reader_home' && <ReaderHome db={db} setView={setView} user={user} />}
                        {view === 'admin_home' && <AdminHome db={db} user={user} />}
                        {view === 'search' && <SearchView books={filteredBooks} onBorrow={borrowBook} search={search} setSearch={setSearch} user={user} deleteBook={deleteBook} />}
                        {view === 'my' && <MyBorrowings db={db} user={user} />}
                        {view === 'add' && <AddBook />}
                        {view === 'users' && <UsersManagement db={db} setDb={setDb} />}
                        {view === 'eval_admin' && <EvaluationsManager user={user} />}
                        {view === 'eval_form' && <BookEvaluation user={user} />}
                    </main>
                </div>
            );
        }

        // ======================== ReaderHome ========================
        function ReaderHome({ db, setView, user }) {
            const myBorrows = db.borrowings.filter(b => b.userId === user.id && b.status === 'BORROWED').length;
            const limit = READER_TYPES[user.readerType || 'UNDERGRAD']?.limit || 5;
            return (
                <div className="animate-in max-w-6xl mx-auto">
                    <div className="bg-gradient-to-br from-[#2c1810] to-[#4a2c1a] p-6 sm:p-8 lg:p-12 rounded-[3rem] text-white relative overflow-hidden mb-6 sm:mb-12 shadow-2xl shadow-[#2c1810]/20">
                        <div className="relative z-10 flex justify-between items-center">
                            <div>
                                <h2 className="text-4xl font-black mb-4 tracking-tighter" style={{ fontFamily: 'serif' }}>
                                    {user.role === 'GUEST' ? '游客朋友，欢迎来访' : `${user.name} 同学，展卷安好`}
                                </h2>
                                <p className="text-[#b8a99a] max-w-md leading-relaxed font-medium">
                                    {user.role === 'GUEST'
                                        ? '"书卷多情似故人，晨昏忧乐每相亲。" 登录后即可借阅馆藏。'
                                        : `"书卷多情似故人，晨昏忧乐每相亲。" 您当前的借阅额度为 ${myBorrows} / ${limit} 本。`
                                    }
                                </p>
                                <button onClick={() => setView('search')}
                                        className="mt-8 px-8 py-3 bg-white text-[#2c1810] rounded-xl font-bold text-sm hover:scale-105 transition-transform flex items-center gap-2">
                                    <Icon name="search" size={16} /> 立即探索馆藏
                                </button>
                            </div>
                            <div className="hidden lg:block text-right pr-10">
                                <div className="text-6xl font-black text-white/20 mb-2">{new Date().getDate()}</div>
                                <div className="text-xl font-bold text-white/60">{new Date().toLocaleString('zh-CN', { month: 'long', weekday: 'long' })}</div>
                            </div>
                        </div>
                        <Icon name="book-open" size={240} className="absolute right-[-40px] bottom-[-60px] opacity-10 rotate-[-15deg]" />
                    </div>

                    <div className="flex items-center justify-between mb-8 px-2">
                        <h3 className="text-2xl font-black flex items-center gap-3 text-[#2c1810]" style={{ fontFamily: 'serif' }}>
                            <div className="w-2 h-8 bg-[#b22222] rounded-full shadow-lg shadow-[#b22222]/20"></div>
                            新书速递
                        </h3>
                        <button onClick={() => setView('search')} className="text-sm font-bold text-[#8b7355] hover:text-[#2c1810]">查看全部图书 →</button>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        {db.books.slice(0, 5).map(b => (
                            <div key={b.id} onClick={() => setView('search')}
                                 className="book-card bg-white p-4 rounded-3xl border border-[#d4c5b2]/30 transition-all cursor-pointer group">
                                <div className="relative overflow-hidden rounded-2xl mb-4 shadow-sm group-hover:shadow-lg transition-all aspect-[3/4]">
                                    <img src={b.cover} className="w-full h-full object-cover" />
                                    {b.available === 0 && (
                                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                                            <span className="px-3 py-1 bg-white/90 text-[#2c1810] text-xs font-bold rounded-full">已借罄</span>
                                        </div>
                                    )}
                                </div>
                                <h4 className="font-bold text-[#2c1810] break-words line-clamp-2 text-sm">{b.title}</h4>
                                <p className="text-[10px] text-[#8b7355] font-bold uppercase mt-1 truncate">{b.author}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ======================== AdminHome ========================
        function AdminHome({ db, user }) {
            const activeUsers = db.users.filter(u => u.status === 'ACTIVE').length || db.books.length > 0 ? (db.users.length || 1) : 1;
            const inBorrow = db.borrowings.filter(b => b.status === 'BORROWED').length;
            const totalBooks = db.books.reduce((a, b) => a + (b.total || 0), 0);
            const stats = [
                { label: '在馆藏书 (册)', val: totalBooks, icon: 'book', color: 'red' },
                { label: '活跃读者 (人)', val: activeUsers, icon: 'users', color: 'amber' },
                { label: '当前借出 (次)', val: inBorrow, icon: 'repeat', color: 'green' }
            ];
            const colorMap = { red: 'bg-[#b22222]/10 text-[#b22222]', amber: 'bg-[#8b7355]/10 text-[#8b7355]', green: 'bg-[#2d5a27]/10 text-[#2d5a27]' };

            return (
                <div className="animate-in max-w-5xl mx-auto">
                    <h2 className="text-3xl font-black mb-8 text-[#2c1810]" style={{ fontFamily: 'serif' }}>系统运行全景仪表盘</h2>
                    <div className="grid grid-cols-3 gap-6 mb-6 sm:mb-10">
                        {stats.map(s => (
                            <div key={s.label} className="bg-white p-6 rounded-[2rem] border border-[#d4c5b2]/30 shadow-sm relative overflow-hidden group">
                                <div className="relative z-10">
                                    <div className="flex items-center justify-between mb-2">
                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform ${colorMap[s.color]}`}>
                                            <Icon name={s.icon} />
                                        </div>
                                        <span className="text-4xl font-black text-[#2c1810] tracking-tighter">{s.val}</span>
                                    </div>
                                    <p className="text-[11px] font-bold text-[#8b7355] uppercase tracking-widest">{s.label}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-2 gap-8">
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-[#d4c5b2]/30">
                            <h3 className="text-lg font-black mb-6 text-[#2c1810]" style={{ fontFamily: 'serif' }}>实时馆藏动态</h3>
                            <div className="space-y-5">
                                {db.books.slice(0, 4).map(b => (
                                    <div key={b.id} className="flex items-center justify-between group">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-14 bg-[#faf6f0] rounded-lg overflow-hidden border border-[#d4c5b2]/30 shadow-sm">
                                                <img src={b.cover} className="w-full h-full object-cover" />
                                            </div>
                                            <div>
                                                <p className="font-bold text-sm text-[#2c1810] break-words whitespace-normal">{b.title}</p>
                                                <p className="text-[10px] text-[#8b7355] mt-1">{b.location}</p>
                                            </div>
                                        </div>
                                        <div className="flex flex-col items-end gap-1">
                                            <span className="text-xs font-bold text-[#2c1810]">{b.available} / {b.total}</span>
                                            <div className="w-24 bg-[#faf6f0] h-1.5 rounded-full overflow-hidden">
                                                <div className="h-full bg-[#b22222]" style={{ width: `${b.total > 0 ? (b.available / b.total) * 100 : 0}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-[#d4c5b2]/30">
                            <h3 className="text-lg font-black mb-6 text-[#2c1810]" style={{ fontFamily: 'serif' }}>最新注册读者</h3>
                            <div className="space-y-4">
                                {[...db.users].slice(-5).reverse().map(u => (
                                    <div key={u.id} className="flex items-center justify-between p-3 rounded-2xl hover:bg-[#faf6f0] transition-colors">
                                        <div className="flex items-center gap-3">

        // ======================== BookEvaluation（书屋评价） ========================
        function BookEvaluation({ user }) {
            const [evals, setEvals] = useState([]);
            const [loading, setLoading] = useState(true);
            const [form, setForm] = useState({ q1: '', q1Custom: '', q2: '', q2Custom: '', q3: '', q4: '', q5: null, q5Preview: '', q6: '' });
            const [uploading, setUploading] = useState(false);
            const [submitting, setSubmitting] = useState(false);
            const [msg, setMsg] = useState(null);
            const [q6Focused, setQ6Focused] = useState(false);
            const fileRef = useRef(null);

            const isGuest = user.role === 'GUEST';

            const fetchEvals = async () => {
                let query = supabase.from('evaluations').select('*').order('created_at', { ascending: false });
                if (isGuest && user.guest_token) {
                    query = query.eq('guest_token', user.guest_token);
                }
                const { data, error } = await query;
                if (!error && data) setEvals(data);
                setLoading(false);
            };

            useEffect(() => { fetchEvals(); }, []);

            const handlePhotoSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) return setMsg({ type: 'warn', text: '照片大小不能超过 5MB' });
                const reader = new FileReader();
                reader.onload = (ev) => setForm({ ...form, q5: file, q5Preview: ev.target.result });
                reader.readAsDataURL(file);
            };

            const handleSubmit = async () => {
                if (!form.q1) return setMsg({ type: 'warn', text: '请选择 Q1：我们是怎么认识的？' });
                if (form.q1 === '其他' && !form.q1Custom.trim()) return setMsg({ type: 'warn', text: '请填写 Q1 自定义相识方式' });
                if (!form.q2) return setMsg({ type: 'warn', text: '请选择 Q2：我们现在是什么关系？' });
                if (form.q2 === '其他' && !form.q2Custom.trim()) return setMsg({ type: 'warn', text: '请填写 Q2 自定义关系' });

                setSubmitting(true); setMsg(null);

                let photoUrl = '';
                if (form.q5) {
                    try {
                        const ext = form.q5.name.split('.').pop() || 'jpg';
                        const filePath = `eval_${Date.now()}_${Math.random().toString(36).substring(2,6)}.${ext}`;
                        const { error: uploadErr } = await supabase.storage.from('eval-photos').upload(filePath, form.q5);
                        if (uploadErr) throw uploadErr;
                        const { data: urlData } = supabase.storage.from('eval-photos').getPublicUrl(filePath);
                        photoUrl = urlData.publicUrl;
                    } catch (e) {
                        setSubmitting(false);
                        return setMsg({ type: 'err', text: '照片上传失败：' + (e.message || e) });
                    }
                }

                const row = {
                    q1_meet: form.q1 === '其他' ? form.q1Custom.trim() : form.q1,
                    q1_meet_custom: form.q1 === '其他' ? form.q1Custom.trim() : null,
                    q2_relation: form.q2 === '其他' ? form.q2Custom.trim() : form.q2,
                    q2_relation_custom: form.q2 === '其他' ? form.q2Custom.trim() : null,
                    q3_first_impression: form.q3.trim() || null,
                    q5_message: form.q4.trim() || null,
                    q4_personality: form.q6.trim() || null,
                    photo_url: photoUrl || null,
                    user_id: isGuest ? null : (user.id || null),
                    guest_token: isGuest ? (user.guest_token || null) : null
                };

                const { error } = await supabase.from('evaluations').insert(row);
                if (error) {
                    setMsg({ type: 'err', text: '投递失败：' + error.message });
                } else {
                    setMsg({ type: 'ok', text: '素笺已投，感谢寄语！' });
                    setForm({ q1: '', q1Custom: '', q2: '', q2Custom: '', q3: '', q4: '', q5: null, q5Preview: '', q6: '' });
                    setQ6Focused(false);
                    fetchEvals();
                }
                setSubmitting(false);
            };

            const Q1_OPTIONS = ['小学', '初中', '高中', '大学', '其他'];

        // ======================== AddBook ========================
        function AddBook() {
            const DRAFT_KEY = "ADD_BOOK_DRAFT";
            const [f, setF] = useState(() => {
                const savedDraft = localStorage.getItem(DRAFT_KEY);
                return savedDraft ? JSON.parse(savedDraft) : { title: '', isbn: '', author: '', category: '计算机科学', total: 5, cover: '', location: '' };
            });
            const [pdfFile, setPdfFile] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            useEffect(() => { localStorage.setItem(DRAFT_KEY, JSON.stringify(f)); }, [f]);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setF(prev => ({ ...prev, cover: ev.target.result }));
                reader.readAsDataURL(file);
            };

            const submit = async (e) => {
                e.preventDefault();
                if (!f.title || !f.isbn) return alert("书名和 ISBN 不能为空");
                if (!f.total || parseInt(f.total) < 1) return alert("入库复本量至少为 1");
                if (!f.location) return alert("请填写馆藏架位");
                const { data: existing } = await supabase.from('books').select('id').eq('isbn', f.isbn).maybeSingle();
                if (existing) return alert("该书已存在，请检查 ISBN");
                setIsUploading(true);
                let finalPdfUrl = '';
                try {
                    if (pdfFile) {
                        const ext = pdfFile.name.split('.').pop() || 'pdf';
                        const filePath = `book_${Date.now()}.${ext}`;
                        const { error: uploadError } = await supabase.storage.from('books-pdf').upload(filePath, pdfFile);
                        if (uploadError) throw uploadError;
                        const { data: urlData } = supabase.storage.from('books-pdf').getPublicUrl(filePath);
                        finalPdfUrl = urlData.publicUrl;
                    }
                    const newBook = {
                        isbn: f.isbn, title: f.title, author: f.author || '未知',
                        category: f.category, total: parseInt(f.total), available: parseInt(f.total),
                        location: f.location || '密集书库',
                        cover: f.cover || 'https://via.placeholder.com/300x400?text=No+Cover',
                        pdf_url: finalPdfUrl
                    };
                    const { error } = await supabase.from('books').insert([newBook]);
                    if (error) throw error;
                    alert("✅ 云端实时同步成功！");
                    setPdfFile(null);
                    setF({ title: '', isbn: '', author: '', category: '计算机科学', total: 5, cover: '', location: '' });
                } catch (err) {
                    alert("操作失败：" + (err.message || err));
                } finally {
                    setIsUploading(false);
                }
            };

            return (
                <div className="max-w-3xl mx-auto animate-in">
                    <div className="text-center mb-6 sm:mb-10">
                        <h2 className="text-3xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>新文献入库编目</h2>
                        <p className="text-[#8b7355] text-sm mt-2">录入数据将实时同步至云端馆藏库</p>
                    </div>
                    <form onSubmit={submit} className="bg-white p-6 sm:p-10 rounded-[3rem] shadow-sm border border-[#d4c5b2]/30 grid grid-cols-1 sm:grid-cols-2 gap-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#b22222]/5 rounded-bl-[100px] -z-10"></div>
                        <Field label="标准书号 (ISBN)" value={f.isbn} onChange={v => setF({ ...f, isbn: v })} placeholder="如: 978-7-302-..." />
                        <Field label="文献正题名" value={f.title} onChange={v => setF({ ...f, title: v })} placeholder="书名" />
                        <Field label="责任者 (作者)" value={f.author} onChange={v => setF({ ...f, author: v })} placeholder="作者编者" />
                        <Field label="中图分类号/类别" value={f.category} onChange={v => setF({ ...f, category: v })} />
                        <Field label="物理馆藏架位" value={f.location} onChange={v => setF({ ...f, location: v })} placeholder="如: 北馆 3F-A1区" />
                        <Field label="入库复本量" type="number" value={f.total} onChange={v => setF({ ...f, total: v })} />

                        <div className="col-span-2 space-y-3 p-5 bg-[#faf6f0]/50 rounded-2xl border border-[#d4c5b2]/30">
                            <label className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest">书影采集 (封面图)</label>
                            <div className="flex flex-col md:flex-row items-center gap-6">
                                {f.cover ? (
                                    <img src={f.cover} alt="预览" className="w-28 h-36 object-cover rounded-xl shadow-md border border-[#d4c5b2]/30" />
                                ) : (
                                    <div className="w-28 h-36 border-2 border-dashed border-[#d4c5b2] rounded-xl flex items-center justify-center text-[#b8a99a] bg-white">
                                        <Icon name="image" size={24} />
                                    </div>
                                )}
                                <div className="flex-1 w-full space-y-3">
                                    <input type="file" accept="image/*" onChange={handleFileSelect}
                                           className="w-full text-sm text-[#8b7355] file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-white file:text-[#b22222] file:shadow-sm hover:file:bg-[#b22222]/5 transition-all cursor-pointer" />
                                    <div className="flex items-center gap-2">
                                        <hr className="flex-1 border-[#d4c5b2]/30" />
                                        <span className="text-xs text-[#8b7355] font-medium uppercase">OR</span>
                                        <hr className="flex-1 border-[#d4c5b2]/30" />
                                    </div>
                                    <input type="text" value={f.cover && !f.cover.startsWith('data:') ? f.cover : ''}
                                           onChange={e => setF({ ...f, cover: e.target.value })}
                                           placeholder="在此粘贴网络图片 URL 链接"
                                           className="w-full p-3 bg-white border border-[#d4c5b2]/30 rounded-xl text-sm focus:ring-2 ring-[#8b4513]/30 outline-none transition-all shadow-sm text-[#2c1810]" />
                                </div>
                            </div>
                        </div>

                        <div className="col-span-2 space-y-3 p-5 bg-[#faf6f0]/50 rounded-2xl border border-[#d4c5b2]/30">
                            <label className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest">电子书 PDF 上传</label>
                            <div className="flex flex-col md:flex-row items-center gap-6">
                                {pdfFile ? (
                                    <div className="w-40 h-12 bg-emerald-50 border border-emerald-200 rounded-2xl flex items-center justify-center text-emerald-700 font-medium text-sm gap-2 px-4">
                                        <Icon name="file-text" size={20} />
                                        {pdfFile.name.length > 22 ? pdfFile.name.substring(0, 19) + '...' : pdfFile.name}
                                    </div>
                                ) : (
                                    <div className="w-40 h-12 border-2 border-dashed border-[#d4c5b2] rounded-2xl flex items-center justify-center text-[#b8a99a] bg-white">
                                        <Icon name="file" size={24} />
                                    </div>
                                )}
                                <div className="flex-1 w-full">
                                    <input type="file" accept="application/pdf"
                                           onChange={e => {
                                               const file = e.target.files[0];
                                               if (file) {
                                                   if (file.type !== 'application/pdf') { alert('仅支持 PDF 格式！'); return; }
                                                   setPdfFile(file);
                                               }
                                           }}
                                           className="w-full text-sm text-[#8b7355] file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-white file:text-[#b22222] file:shadow-sm hover:file:bg-[#b22222]/5 transition-all cursor-pointer" />
                                </div>
                            </div>
                            {pdfFile && <p className="text-xs text-emerald-600 mt-1">已选中 • {(pdfFile.size / 1024 / 1024).toFixed(2)} MB</p>}
                        </div>

                        <button type="submit" disabled={isUploading}
                                className="col-span-2 py-4 bg-gradient-to-r from-[#b22222] to-[#8b1a1a] text-white rounded-2xl font-bold mt-4 shadow-lg shadow-[#b22222]/20 active:scale-95 transition-all text-lg tracking-wide disabled:opacity-70 flex items-center justify-center gap-2">
                            {isUploading ? (
                                <><Icon name="loader-2" size={20} className="animate-spin" /> 上传中…</>
                            ) : (
                                <><Icon name="save" className="inline-block -mt-1" size={20} /> 确认入库并发布</>
                            )}
                        </button>
                    </form>
                </div>
            );
        }

        // ======================== 基础组件 ========================
        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick}
                    className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold transition-all ${active ? 'bg-gradient-to-r from-[#2c1810] to-[#4a2c1a] text-white shadow-md' : 'text-[#8b7355] hover:bg-[#faf6f0] hover:text-[#2c1810]'}`}>
                <Icon name={icon} size={18} className={active ? 'text-white' : ''} />
                <span className="text-sm">{label}</span>
            </button>
        );

        const Field = ({ label, value, onChange, type = "text", placeholder, disabled = false }) => (
            <div className="space-y-1.5">
                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">{label}</label>
                <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
                       className="w-full p-3.5 bg-[#faf6f0] border border-[#d4c5b2]/30 rounded-xl text-sm focus:ring-2 ring-[#8b4513]/30 outline-none transition-all disabled:opacity-50 disabled:cursor-not-allowed text-[#2c1810] placeholder-[#b8a99a]" required />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
