                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="text-3xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>读者信息管理</h2>
                            <p className="text-[#8b7355] text-sm mt-2">
                                {loading ? '加载中…' : `共 ${readers.length} 位注册读者在册`}
                            </p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={exportCSV} className="px-5 py-2.5 bg-white border border-[#d4c5b2]/30 text-[#8b7355] rounded-xl font-bold text-sm hover:bg-[#faf6f0] transition-all flex items-center gap-2 shadow-sm">
                                <Icon name="download" size={16} /> 导出名单
                            </button>
                            <button onClick={() => { setEditingUser(null); setShowForm(true); }}
                                    className="px-5 py-2.5 bg-gradient-to-r from-[#b22222] to-[#8b1a1a] text-white rounded-xl font-bold text-sm shadow-lg shadow-[#b22222]/20 hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                                <Icon name="user-plus" size={16} /> 新增读者
                            </button>
                        </div>
                    </div>

                    {!loading && readers.length === 0 && (
                        <div className="mb-4 p-4 bg-amber-50 border border-amber-200 rounded-2xl text-sm text-amber-800 flex items-center justify-between">
                            <span>📭 暂无读者数据 — 需要先在 Supabase SQL Editor 执行 <code className="px-1.5 py-0.5 bg-amber-100 rounded text-xs font-mono">sql/readers.sql</code> 创建表</span>
                            <button onClick={() => { setLoading(true); fetchReaders(); }}
                                    className="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-xl text-xs font-bold transition-colors">
                                重新加载
                            </button>
                        </div>
                    )}

                    <div className="bg-white rounded-[2rem] border border-[#d4c5b2]/30 shadow-sm overflow-hidden">
                        <div className="p-4 border-b border-[#d4c5b2]/20 flex items-center gap-4 bg-[#faf6f0]/50">
                            <div className="relative flex-1 max-w-md">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-[#8b7355]" />
                                <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                       placeholder="搜索姓名、邮箱…"
                                       className="w-full pl-10 pr-4 py-2 bg-white rounded-lg border border-[#d4c5b2]/30 shadow-sm focus:ring-2 ring-[#8b4513]/20 outline-none text-sm transition-all text-[#2c1810]" />
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-[#faf6f0] text-[11px] font-black text-[#8b7355] uppercase tracking-widest border-b border-[#d4c5b2]/20">
                                        <th className="p-4 pl-6">读者信息</th>
                                        <th className="p-4">院系/部门</th>
                                        <th className="p-4">借阅统计</th>
                                        <th className="p-4">账号状态</th>
                                        <th className="p-4">注册时间</th>
                                        <th className="p-4 pr-6 text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-[#d4c5b2]/10">
                                    {filteredReaders.map(r => {
                                        const stats = getBorrowStats(r.id);
                                        return (
                                            <tr key={r.id} className="hover:bg-[#faf6f0]/50 transition-colors">
                                                <td className="p-4 pl-6">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full bg-[#b22222]/10 text-[#b22222] flex items-center justify-center font-bold text-sm">{(r.name || '?')[0]}</div>
                                                        <div>
                                                            <p className="font-bold text-[#2c1810] text-sm">{r.name}</p>
                                                            <p className="text-[11px] text-[#8b7355] mt-0.5">{r.email}</p>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="p-4 text-sm text-[#2c1810]">{r.department}</td>
                                                <td className="p-4">
                                                    <span className="text-sm font-bold text-[#b22222]">{stats.current}</span>
                                                    <span className="text-xs text-[#8b7355]"> 在借 / </span>
                                                    <span className="text-sm text-[#2c1810]">{stats.total}</span>
                                                    <span className="text-xs text-[#8b7355]"> 总计</span>
                                                </td>
                                                <td className="p-4">
                                                    <div className="flex items-center gap-2">
                                                        <span className={`px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-wider ${r.status === 'ACTIVE' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-500'}`}>
                                                            {r.status === 'ACTIVE' ? '正常' : '冻结'}
                                                        </span>
                                                        <button onClick={() => toggleStatus(r)}
                                                                className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors ${r.status === 'ACTIVE' ? 'bg-green-500' : 'bg-gray-300'}`}>
                                                            <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${r.status === 'ACTIVE' ? 'translate-x-[18px]' : 'translate-x-[2px]'}`} />
                                                        </button>
                                                    </div>
                                                </td>
                                                <td className="p-4 text-xs text-[#8b7355]">
                                                    {r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) : '-'}
                                                </td>
                                                <td className="p-4 pr-6 text-right" style={{ minWidth: 280 }}>
                                                    <div className="flex items-center justify-end gap-1 flex-wrap">
                                                        <button onClick={() => { setEditingUser(r); setShowForm(true); }} title="编辑"
                                                                className="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-bold text-green-600 bg-green-50 border border-green-200 rounded-lg hover:bg-green-100 transition-colors whitespace-nowrap">
                                                            <Icon name="edit" size={14} /> 编辑
                                                        </button>
                                                        <button onClick={() => { setCredentialModal(r); }} title="查看凭证"
                                                                className="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-bold text-blue-600 bg-blue-50 border border-blue-200 rounded-lg hover:bg-blue-100 transition-colors whitespace-nowrap">
                                                            <Icon name="eye" size={14} /> 凭证
                                                        </button>
                                                        <button onClick={async () => {
                                                                setReaderEvalModal(r);
                                                                setReaderEvalsLoading(true);
                                                                setReaderEvals([]);
                                                                const { data: evals } = await supabase
                                                                    .from('evaluations')
                                                                    .select('*')
                                                                    .eq('user_id', r.id)
                                                                    .order('created_at', { ascending: false });
                                                                if (evals) setReaderEvals(evals);
                                                                setReaderEvalsLoading(false);
                                                            }} title="查看该读者评价"
                                                            className="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 rounded-lg hover:bg-indigo-100 transition-colors whitespace-nowrap">
                                                            <Icon name="message-square" size={14} /> 查看读者评价
                                                        </button>
                                                        <button onClick={() => { setResetPwModal(r); setResetPwValue(''); setResetPwMsg(null); }} title="重置密码"
                                                                className="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-bold text-orange-500 bg-orange-50 border border-orange-200 rounded-lg hover:bg-orange-100 transition-colors whitespace-nowrap">
                                                            <Icon name="key" size={14} /> 重置
                                                        </button>
                                                        <button onClick={() => toggleStatus(r)} title={r.status === 'ACTIVE' ? '冻结账号' : '解冻账号'}
                                                                className={`inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-bold rounded-lg border transition-colors whitespace-nowrap ${r.status === 'ACTIVE' ? 'text-[#8b7355] bg-[#faf6f0] border-[#d4c5b2]/40 hover:bg-red-50 hover:text-red-500 hover:border-red-200' : 'text-red-500 bg-red-50 border-red-200 hover:bg-red-100'}`}>
                                                            <Icon name={r.status === 'ACTIVE' ? 'lock' : 'unlock'} size={14} /> {r.status === 'ACTIVE' ? '冻结' : '解冻'}
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {!loading && readers.length === 0 && (
                                        <tr><td colSpan="6" className="p-8 text-center text-[#8b7355]">
                                            <Icon name="inbox" size={32} className="mx-auto mb-3 opacity-50" />
                                            <p>暂无读者数据</p>
                                            <p className="text-xs mt-2 opacity-70">需要先在登录页注册账号，或在 Supabase 控制台执行 sql/readers.sql 创建表</p>
                                        </td></tr>
                                    )}
                                    {!loading && readers.length > 0 && filteredReaders.length === 0 && (
                                        <tr><td colSpan="6" className="p-8 text-center text-[#8b7355]">未找到匹配的读者记录</td></tr>
                                    )}
                                    {loading && (
                                        <tr><td colSpan="6" className="p-8 text-center text-[#8b7355]"><Icon name="loader-2" size={20} className="animate-spin inline-block" /> 加载中…</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* 查看凭证模态框 */}
                    {credentialModal && (
                        <div className="fixed inset-0 bg-[#2c1810]/40 backdrop-blur-sm flex items-center justify-center z-50 animate-in" onClick={() => setCredentialModal(null)}>
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-[420px] mx-4 border border-[#d4c5b2]/30" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>读者凭证</h3>
                                    <button onClick={() => setCredentialModal(null)} className="p-2 text-[#8b7355] hover:bg-[#faf6f0] rounded-full"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-4 p-4 bg-[#faf6f0] rounded-2xl">
                                        <div className="w-14 h-14 rounded-full bg-[#b22222]/10 text-[#b22222] flex items-center justify-center font-bold text-xl">{(credentialModal.name || '?')[0]}</div>
                                        <div>
                                            <p className="font-black text-lg text-[#2c1810]">{credentialModal.name}</p>
                                            <p className="text-sm text-[#8b7355]">{credentialModal.email}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 text-sm">
                                        <div className="p-3 bg-[#faf6f0] rounded-xl">
                                            <p className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest mb-1">注册邮箱</p>
                                            <p className="text-[#2c1810] font-medium break-all">{credentialModal.email || '-'}</p>
                                        </div>
                                        <div className="p-3 bg-[#faf6f0] rounded-xl">
                                            <p className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest mb-1">院系</p>
                                            <p className="text-[#2c1810] font-medium">{credentialModal.department || '-'}</p>
                                        </div>
                                        <div className="p-3 bg-[#faf6f0] rounded-xl">
                                            <p className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest mb-1">状态</p>
                                            <p className="text-[#2c1810] font-medium">{credentialModal.status === 'ACTIVE' ? '正常' : '冻结'}</p>
                                        </div>
                                        <div className="p-3 bg-[#faf6f0] rounded-xl">
                                            <p className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest mb-1">注册时间</p>
                                            <p className="text-[#2c1810] font-medium">{credentialModal.created_at ? new Date(credentialModal.created_at).toLocaleDateString('zh-CN') : '-'}</p>
                                        </div>
                                    </div>
                                    <p className="text-[10px] text-[#b8a99a] leading-relaxed">密码已通过 Supabase Auth 加密存储，无法逆向查看明文。如需重置密码，请使用"重置密码"功能。</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 重置密码模态框 */}
                    {resetPwModal && (
                        <div className="fixed inset-0 bg-[#2c1810]/40 backdrop-blur-sm flex items-center justify-center z-50 animate-in" onClick={() => { setResetPwModal(null); setResetPwMsg(null); }}>
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-[420px] mx-4 border border-[#d4c5b2]/30" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>重置密码</h3>
                                    <button onClick={() => { setResetPwModal(null); setResetPwMsg(null); }} className="p-2 text-[#8b7355] hover:bg-[#faf6f0] rounded-full"><Icon name="x" size={20} /></button>
                                </div>
                                <p className="text-sm text-[#8b7355] mb-4">为 <strong className="text-[#2c1810]">{resetPwModal.name}</strong> 设置新密码：</p>
                                <input value={resetPwValue} onChange={e => setResetPwValue(e.target.value)}
                                       className="w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/30 transition-all text-[#2c1810] placeholder-[#b8a99a] mb-3"
                                       placeholder="输入新密码（至少 6 位）" type="text" />
                                {resetPwMsg && (
                                    <div className="mb-3 p-3 bg-[#fef2f2] border border-[#fecaca] text-[#991b1b] rounded-xl text-sm">{resetPwMsg}</div>
                                )}
                                <button onClick={() => handleResetPassword(resetPwModal)}
                                        className="w-full py-4 rounded-xl font-bold text-white shadow-lg transition-all active:scale-95 bg-gradient-to-r from-[#b22222] to-[#8b1a1a] shadow-[#b22222]/20 flex items-center justify-center gap-2">
                                    <Icon name="key" size={18} /> 确认重置
                                </button>
                            </div>
                        </div>
                    )}

                    }

                    {/* 查看读者评价模态框 */}
                    {readerEvalModal && (
                        <div className="fixed inset-0 bg-[#2c1810]/40 backdrop-blur-sm flex items-center justify-center z-50 animate-in" onClick={() => setReaderEvalModal(null)}>
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-3xl mx-4 border border-[#d4c5b2]/30 max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <div>
                                        <h3 className="text-xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>读者评价</h3>
                                        <p className="text-sm text-[#8b7355] mt-1">
                                            {readerEvalModal.name} · 共 {readerEvals.length} 条评价
                                        </p>
                                    </div>
                                    <button onClick={() => setReaderEvalModal(null)} className="p-2 text-[#8b7355] hover:bg-[#faf6f0] rounded-full"><Icon name="x" size={20} /></button>
                                </div>

                                <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                                    {readerEvalsLoading ? (
                                        <div className="flex items-center justify-center py-16">
                                            <Icon name="loader-2" size={24} className="animate-spin text-[#8b7355]" />
                                            <span className="ml-3 text-[#8b7355] text-sm font-medium">加载中…</span>
                                        </div>
                                    ) : readerEvals.length === 0 ? (
                                        <div className="py-16 text-center">
                                            <div className="w-16 h-16 bg-[#faf6f0] rounded-full flex items-center justify-center mx-auto mb-4">
                                                <Icon name="inbox" size={28} className="text-[#b8a99a]" />
                                            </div>
                                            <p className="text-[#8b7355] font-medium">该读者暂无评价记录</p>
                                        </div>
                                    ) : (
                                        readerEvals.map(ev => (
                                            <div key={ev.id} className="bg-[#faf6f0] p-5 rounded-2xl border border-[#d4c5b2]/20">
                                                <div className="flex items-center justify-between mb-3 pb-2 border-b border-[#d4c5b2]/20">
                                                    <p className="text-[10px] text-[#8b7355] font-medium">{new Date(ev.created_at).toLocaleString('zh-CN')}</p>
                                                    <span className="text-[10px] text-[#b8a99a] font-mono">#{String(readerEvalNumberMap.get(ev.id) || '?').padStart(4, '0')}</span>
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm">
                                                    <div className="flex gap-2">
                                                        <span className="text-[#b22222] font-bold shrink-0">Q1</span>
                                                        <span className="text-[#2c1810]">{ev.q1_meet || '-'}</span>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <span className="text-[#b22222] font-bold shrink-0">Q2</span>
                                                        <span className="text-[#2c1810]">{ev.q2_relation || '-'}</span>
                                                    </div>
                                                    {ev.q3_first_impression && (
                                                        <div className="flex gap-2">
                                                            <span className="text-[#8b7355] font-bold shrink-0">Q3</span>
                                                            <span className="text-[#2c1810] italic">{ev.q3_first_impression}</span>
                                                        </div>
                                                    )}
                                                    {ev.q5_message && (
                                                        <div className="flex gap-2">
                                                            <span className="text-[#8b7355] font-bold shrink-0">Q4</span>
                                                            <span className="text-[#2c1810] italic">{ev.q5_message}</span>
                                                        </div>
                                                    )}
                                                    {ev.q4_personality && (
                                                        <div className="flex gap-2">
                                                            <span className="text-[#8b7355] font-bold shrink-0">Q6</span>
                                                            <span className="text-[#2c1810] italic">{ev.q4_personality}</span>
                                                        </div>
                                                    )}
                                                </div>
                                                {ev.photo_url && (
                                                    <div className="mt-3 pt-3 border-t border-[#d4c5b2]/20">
                                                        <img src={ev.photo_url} alt="评价附图"
                                                             className="w-full max-h-48 object-cover rounded-xl border border-[#d4c5b2]/30 cursor-pointer"
                                                             onClick={() => window.open(ev.photo_url, '_blank')} />
                                                    </div>
                                                )}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showForm && (
                        <UserFormModal user={editingUser} onClose={() => setShowForm(false)} onSave={handleSaveForm} />
                    )}
                </div>
            );
        }

        // ======================== UserFormModal ========================
        function UserFormModal({ user, onClose, onSave }) {
            const [form, setForm] = useState(user || { account: '', name: '', department: '', phone: '', email: '', readerType: 'UNDERGRAD', role: 'READER' });
            return (
                <div className="fixed inset-0 bg-[#2c1810]/40 backdrop-blur-sm flex items-center justify-center z-50 animate-in">
                    <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-[500px] mx-4 border border-[#d4c5b2]/30">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>{user ? '编辑读者信息' : '新增读者档案'}</h3>
                            <button onClick={onClose} className="p-2 text-[#8b7355] hover:bg-[#faf6f0] rounded-full"><Icon name="x" size={20} /></button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <Field label="手机号/账号" value={form.account} onChange={v => setForm({ ...form, account: v })} disabled={!!user} />
                            <Field label="真实姓名" value={form.name} onChange={v => setForm({ ...form, name: v })} />
                            <Field label="院系/部门" value={form.department} onChange={v => setForm({ ...form, department: v })} />
                            <Field label="联系电话" value={form.phone} onChange={v => setForm({ ...form, phone: v })} />
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">读者类型</label>
                                <select value={form.readerType} onChange={e => setForm({ ...form, readerType: e.target.value })}
                                        className="w-full p-3 bg-[#faf6f0] border border-[#d4c5b2]/30 rounded-xl text-sm focus:ring-2 ring-[#8b4513]/30 outline-none text-[#2c1810]">
                                    <option value="UNDERGRAD">本科生 (额度10本)</option>
                                    <option value="POSTGRAD">研究生 (额度20本)</option>
                                    <option value="STAFF">教职工 (额度30本)</option>
                                </select>
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">系统角色</label>
                                <select value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}
                                        className="w-full p-3 bg-[#faf6f0] border border-[#d4c5b2]/30 rounded-xl text-sm focus:ring-2 ring-[#8b4513]/30 outline-none text-[#2c1810]">
                                    <option value="READER">普通读者</option>
                                    <option value="ADMIN">系统管理员</option>
                                </select>
                            </div>
                        </div>
                        {!user && <p className="text-xs text-amber-600 mt-4 bg-amber-50 p-3 rounded-lg border border-amber-100">💡 提示：新读者的初始密码将自动设置为账号后6位。</p>}
                        <div className="flex gap-3 mt-8">
                            <button onClick={onClose} className="flex-1 py-3 bg-[#faf6f0] text-[#8b7355] rounded-xl font-bold hover:bg-[#d4c5b2]/20 transition-colors">取消</button>
                            <button onClick={() => onSave(form)} className="flex-1 py-3 bg-gradient-to-r from-[#b22222] to-[#8b1a1a] text-white rounded-xl font-bold shadow-lg shadow-[#b22222]/20 hover:scale-105 active:scale-95 transition-all">保存信息</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ======================== BookEvaluation（书屋评价） ========================
        function BookEvaluation({ user }) {
            const [evals, setEvals] = useState([]);
            const [loading, setLoading] = useState(true);
            const [form, setForm] = useState({ q1: '', q1Custom: '', q2: '', q2Custom: '', q3: '', q4: '', q5: null, q5Preview: '', q6: '' });
            const [uploading, setUploading] = useState(false);
            const [submitting, setSubmitting] = useState(false);
            const [msg, setMsg] = useState(null);
            const [q6Focused, setQ6Focused] = useState(false);
            const fileRef = useRef(null);

            // 基于时间顺序的动态编号（由旧到新 #0001 开始）
            const evalNumberMap = React.useMemo(() => {
                const sorted = [...evals].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                return new Map(sorted.map((e, i) => [e.id, i + 1]));
            }, [evals]);

            const isGuest = user.role === 'GUEST';

            const fetchEvals = async () => {
                let query = supabase.from('evaluations').select('*').eq('is_hidden', false).order('created_at', { ascending: false });
                if (isGuest && user.guest_token) {
                    query = query.eq('guest_token', user.guest_token);
                }
                const { data, error } = await query;
                if (!error && data) setEvals(data);
                setLoading(false);
            };

            useEffect(() => { fetchEvals(); }, []);

            const handlePhotoSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) return setMsg({ type: 'warn', text: '照片大小不能超过 5MB' });
                const reader = new FileReader();
                reader.onload = (ev) => setForm({ ...form, q5: file, q5Preview: ev.target.result });
                reader.readAsDataURL(file);
            };

            const handleSubmit = async () => {
                if (!form.q1) return setMsg({ type: 'warn', text: '请选择 Q1：我们是怎么认识的？' });
                if (form.q1 === '其他' && !form.q1Custom.trim()) return setMsg({ type: 'warn', text: '请填写 Q1 自定义相识方式' });
                if (!form.q2) return setMsg({ type: 'warn', text: '请选择 Q2：我们现在是什么关系？' });
                if (form.q2 === '其他' && !form.q2Custom.trim()) return setMsg({ type: 'warn', text: '请填写 Q2 自定义关系' });

                setSubmitting(true); setMsg(null);

                let photoUrl = '';
                if (form.q5) {
                    try {
                        const ext = form.q5.name.split('.').pop() || 'jpg';
                        const filePath = `eval_${Date.now()}_${Math.random().toString(36).substring(2,6)}.${ext}`;
                        const { error: uploadErr } = await supabase.storage.from('eval-photos').upload(filePath, form.q5);
                        if (uploadErr) throw uploadErr;
                        const { data: urlData } = supabase.storage.from('eval-photos').getPublicUrl(filePath);
                        photoUrl = urlData.publicUrl;
                    } catch (e) {
                        setSubmitting(false);
                        return setMsg({ type: 'err', text: '照片上传失败：' + (e.message || e) });
                    }
                }

                const row = {
                    q1_meet: form.q1 === '其他' ? form.q1Custom.trim() : form.q1,
                    q1_meet_custom: form.q1 === '其他' ? form.q1Custom.trim() : null,
                    q2_relation: form.q2 === '其他' ? form.q2Custom.trim() : form.q2,
                    q2_relation_custom: form.q2 === '其他' ? form.q2Custom.trim() : null,
                    q3_first_impression: form.q3.trim() || null,
                    q5_message: form.q4.trim() || null,
                    q4_personality: form.q6.trim() || null,
                    photo_url: photoUrl || null,
                    user_id: isGuest ? null : (user.id || null),
                    guest_token: isGuest ? (user.guest_token || null) : null
                };

                const { error } = await supabase.from('evaluations').insert(row);
                if (error) {
                    setMsg({ type: 'err', text: '投递失败：' + error.message });
                } else {
                    setMsg({ type: 'ok', text: '素笺已投，感谢寄语！' });
                    setForm({ q1: '', q1Custom: '', q2: '', q2Custom: '', q3: '', q4: '', q5: null, q5Preview: '', q6: '' });
                    setQ6Focused(false);
                    fetchEvals();
                }
                setSubmitting(false);
            };

            const Q1_OPTIONS = ['小学', '初中', '高中', '大学', '其他'];
            const Q2_OPTIONS = ['师生', '朋友', '大学同学', '其他'];

            if (loading) {
                return (
                    <div className="animate-in max-w-4xl mx-auto text-center py-20">
                        <Icon name="loader-2" size={32} className="animate-spin mx-auto mb-4 text-[#8b7355]" />
                        <p className="text-[#8b7355] text-sm">展笺阅卷中…</p>
                    </div>
                );
            }

            return (
                <div className="animate-in max-w-5xl mx-auto">
                    <div className="mb-8">
                        <h2 className="text-3xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>书屋评价</h2>
                        <p className="text-[#8b7355] text-sm mt-2">
                            {isGuest ? '正在以游客身份浏览（仅可见自己的投笺）' : `共 ${evals.length} 封素笺 · 字字珠玑，落墨生香`}
                        </p>
                    </div>

                    {/* 评价提交表单 */}
                    <div className="bg-white p-8 rounded-[2.5rem] border border-[#d4c5b2]/30 shadow-sm mb-8">
                        <h3 className="text-lg font-black text-[#2c1810] mb-5" style={{ fontFamily: 'serif' }}>投笺寄语</h3>
                        <div className="space-y-5">
                            {/* Q1 + Q2 row */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-[#b22222] uppercase ml-2 tracking-widest">Q1 相识 *</label>
                                    <select value={form.q1} onChange={e => setForm({ ...form, q1: e.target.value, q1Custom: e.target.value === '其他' ? form.q1Custom : '' })}
                                            className="w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/20 transition-all text-[#2c1810] text-sm">
                                        <option value="">— 请选择 —</option>
                                        {Q1_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                    </select>
                                    {form.q1 === '其他' && (
                                        <input value={form.q1Custom} onChange={e => setForm({ ...form, q1Custom: e.target.value })}
                                               placeholder="请填写相识方式…" maxLength={50}
                                               className="w-full p-3 mt-2 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/20 text-[#2c1810] placeholder-[#b8a99a] text-sm" />
                                    )}
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-[#b22222] uppercase ml-2 tracking-widest">Q2 关系 *</label>
                                    <select value={form.q2} onChange={e => setForm({ ...form, q2: e.target.value, q2Custom: e.target.value === '其他' ? form.q2Custom : '' })}
                                            className="w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/20 transition-all text-[#2c1810] text-sm">
                                        <option value="">— 请选择 —</option>
                                        {Q2_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                    </select>
                                    {form.q2 === '其他' && (
                                        <input value={form.q2Custom} onChange={e => setForm({ ...form, q2Custom: e.target.value })}
                                               placeholder="请填写关系…" maxLength={50}
                                               className="w-full p-3 mt-2 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/20 text-[#2c1810] placeholder-[#b8a99a] text-sm" />
                                    )}
                                </div>
                            </div>

                            {/* Q3 */}
                            <div>
                                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">Q3 你对我的第一印象？（选填）</label>
                                <input value={form.q3} onChange={e => setForm({ ...form, q3: e.target.value })}
                                       placeholder="初见时，我给你的印象是…" maxLength={200}
                                       className="w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/20 transition-all text-[#2c1810] placeholder-[#b8a99a] text-sm" />
                            </div>

                            {/* Q4 */}
                            <div>
                                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">Q4 你想对我说点什么？（选填）</label>
                                <textarea value={form.q4} onChange={e => setForm({ ...form, q4: e.target.value })}
                                          rows={4} placeholder="写下你想对我说的心里话…" maxLength={2000}
                                          className="w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/20 transition-all text-[#2c1810] placeholder-[#b8a99a] text-sm resize-none" />
                                <p className="text-[10px] text-[#b8a99a] text-right mt-1">{form.q4.length}/2000</p>
                            </div>

                            {/* Q5 */}
                            <div>
                                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">Q5 上传一张我们之间的照片（选填）</label>
                                <div className="flex items-start gap-4 mt-1">
                                    {form.q5Preview ? (
                                        <div className="relative">
                                            <img src={form.q5Preview} alt="预览" className="w-32 h-32 object-cover rounded-xl border border-[#d4c5b2]/30 shadow-sm" />
                                            <button onClick={() => setForm({ ...form, q5: null, q5Preview: '' })}
                                                    className="absolute -top-2 -right-2 w-6 h-6 bg-red-400 text-white rounded-full flex items-center justify-center text-xs hover:bg-red-500 transition-colors">✕</button>
                                        </div>
                                    ) : (
                                        <div onClick={() => fileRef.current?.click()}
                                             className="w-32 h-32 border-2 border-dashed border-[#d4c5b2] rounded-xl flex flex-col items-center justify-center text-[#b8a99a] cursor-pointer hover:border-[#8b7355] hover:text-[#8b7355] transition-colors bg-[#faf6f0]/50">
                                            <Icon name="camera" size={24} />
                                            <span className="text-[10px] mt-1 font-medium">点击上传</span>
                                        </div>
                                    )}
                                    <input ref={fileRef} type="file" accept="image/*" onChange={handlePhotoSelect} className="hidden" />
                                    <div className="text-[10px] text-[#b8a99a] leading-relaxed">
                                        <p>支持 JPG/PNG 格式</p>
                                        <p>文件不超过 5MB</p>
                                        <p>上传至 eval-photos 存储桶</p>
                                    </div>
                                </div>
                            </div>

                            {/* Q6 */}
                            <div>
                                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">Q6 你是谁？（选填）</label>
                                <input value={form.q6} onChange={e => setForm({ ...form, q6: e.target.value })}
                                       onFocus={() => setQ6Focused(true)} onBlur={() => setQ6Focused(false)}
                                       placeholder={q6Focused ? '' : '感谢您的建议'} maxLength={100}
                                       className="w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/20 transition-all text-[#2c1810] placeholder-[#b8a99a] text-sm" />
                            </div>

                            {msg && (
                                <div className={`p-4 rounded-2xl text-sm font-medium ${
                                    msg.type === 'ok' ? 'bg-[#f0f7f0] text-[#2d5a27] border border-[#c8e6c9]' :
                                    msg.type === 'err' ? 'bg-[#fef2f2] text-[#991b1b] border border-[#fecaca]' :
                                    'bg-[#fefce8] text-[#854d0e] border border-[#fef08a]'}`}>
                                    {msg.text}
                                </div>
                            )}

                            <button onClick={handleSubmit} disabled={submitting || uploading}
                                    className="w-full py-4 bg-gradient-to-r from-[#2c1810] to-[#4a2c1a] text-white rounded-2xl font-bold shadow-lg shadow-[#2c1810]/15 hover:scale-[1.01] active:scale-95 transition-all disabled:opacity-60 flex items-center justify-center gap-2">
                                {submitting ? <><Icon name="loader-2" size={18} className="animate-spin" /> 投递中…</> : <><Icon name="send" size={18} /> 匿名投递</>}
                            </button>
                        </div>
                    </div>

                    {/* 评价列表 */}
                    {evals.length === 0 ? (
                        <div className="py-24 text-center bg-white rounded-[3rem] border-2 border-dashed border-[#d4c5b2]/50">

        // ======================== EvaluationsManager ========================
        function EvaluationsManager({ user }) {
            const [evals, setEvals] = useState([]);
            const [loading, setLoading] = useState(true);
            const [readerInfoMap, setReaderInfoMap] = useState({});
            const [showReaderInfo, setShowReaderInfo] = useState({});

            // 基于时间顺序的动态编号（由旧到新 #0001 开始）
            const evalNumberMap = React.useMemo(() => {
                const sorted = [...evals].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                return new Map(sorted.map((e, i) => [e.id, i + 1]));
            }, [evals]);

            const fetchEvals = async () => {
                const { data, error } = await supabase.from('evaluations').select('*').order('created_at', { ascending: false });
                if (!error && data) {
                    setEvals(data);
                    // 收集所有非游客 user_id，批量查询读者注册信息
                    const userIds = [...new Set(data.filter(e => e.user_id && !e.guest_token).map(e => e.user_id))];
                    if (userIds.length > 0) {
                        const { data: readers } = await supabase
                            .from('readers')
                            .select('id, name, email, department, reader_type, created_at')
                            .in('id', userIds);
                        if (readers) {
                            const map = {};
                            readers.forEach(r => { map[r.id] = r; });
                            setReaderInfoMap(map);
                        }
                    }
                }
                setLoading(false);
            };

            useEffect(() => { fetchEvals(); }, []);

            const handleDelete = async (id) => {
                if (!confirm('确定要删除这条评价吗？此操作不可恢复。')) return;
                const { error } = await supabase.from('evaluations').delete().eq('id', id);
                if (error) { alert('删除失败：' + error.message); }
                else { fetchEvals(); }
            };

            const handleToggleHide = async (id, currentHidden) => {
                const action = currentHidden ? '取消隐藏' : '隐藏';
                if (!confirm(`确定要${action}这条评价吗？`)) return;
                const { error } = await supabase.from('evaluations').update({ is_hidden: !currentHidden }).eq('id', id);
                if (error) { alert('操作失败：' + error.message); }
                else { fetchEvals(); }
            };

            if (!user.is_admin) {
                return (
                    <div className="animate-in max-w-4xl mx-auto text-center py-20">
                        <div className="w-16 h-16 mx-auto mb-5 rounded-full bg-[#fef2f2] flex items-center justify-center text-[#b22222]">
                            <Icon name="shield-alert" size={28} />
                        </div>
                        <h2 className="text-xl font-black text-[#2c1810] mb-2" style={{ fontFamily: 'serif' }}>权限不足</h2>
                        <p className="text-[#8b7355] text-sm">此视图仅对馆长开放</p>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="animate-in max-w-4xl mx-auto text-center py-20">
                        <Icon name="loader-2" size={32} className="animate-spin mx-auto mb-4 text-[#8b7355]" />
                        <p className="text-[#8b7355] text-sm">展笺阅卷中…</p>
                    </div>
                );
            }

            return (
                <div className="animate-in max-w-6xl mx-auto">
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="text-3xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>匿名评价管理</h2>
                            <p className="text-[#8b7355] text-sm mt-2">
                                共 {evals.length} 封素笺投递
                                {evals.filter(e => e.is_hidden).length > 0 && (
                                    <span className="text-red-500 ml-2">· {evals.filter(e => e.is_hidden).length} 封已隐藏</span>
                                )}
                            </p>
                        </div>
                    </div>

                    {evals.length === 0 ? (
                        <div className="py-24 text-center bg-white rounded-[3rem] border-2 border-dashed border-[#d4c5b2]/50">
                            <div className="w-20 h-20 bg-[#faf6f0] rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="inbox" size={32} className="text-[#b8a99a]" />
                            </div>
                            <h4 className="text-lg font-bold text-[#2c1810] mb-2" style={{ fontFamily: 'serif' }}>尚无素笺投递</h4>
                            <p className="text-sm text-[#8b7355]">待读者落墨挥毫，笺至自然可见</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 gap-5">
                            {evals.map(e => (
                                <div key={e.id} className={`bg-white p-6 rounded-[2rem] border shadow-sm hover:shadow-md transition-all ${e.is_hidden ? 'border-red-200/50 opacity-60' : 'border-[#d4c5b2]/30'}`}>
                                    <div className="flex items-start justify-between mb-4 pb-4 border-b border-[#d4c5b2]/20">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-[#b22222]/10 text-[#b22222] flex items-center justify-center font-bold text-sm"
                                                 style={{ fontFamily: 'serif' }}>
                                                {(e.q4_personality || e.q1_meet || '匿')[0]}
                                            </div>
                                            <div>
                                                <p className="font-bold text-[#2c1810] text-sm">{e.q4_personality || e.q1_meet || '匿名读者'}</p>
                                                <p className="text-[10px] text-[#8b7355]">{new Date(e.created_at).toLocaleString('zh-CN')}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 flex-wrap justify-end">
                                            {e.is_hidden && (
                                                <span className="px-2 py-1 bg-red-50 text-red-600 text-[10px] font-bold rounded-full border border-red-200">
                                                    已隐藏
                                                </span>
                                            )}
                                            {e.guest_token && (
                                                <span className="px-2.5 py-1 bg-amber-50 text-amber-700 text-[10px] font-bold rounded-full border border-amber-200">游客投递</span>
                                            )}
                                            <button onClick={() => handleToggleHide(e.id, e.is_hidden)}
                                                    className={`px-3 py-1.5 text-xs font-bold rounded-xl border transition-all flex items-center gap-1.5 ${e.is_hidden ? 'bg-green-50 text-green-700 border-green-200 hover:bg-green-100' : 'bg-[#faf6f0] text-amber-700 border-amber-200/60 hover:bg-amber-50'}`}>
                                                <Icon name={e.is_hidden ? 'eye' : 'eye-off'} size={14} />
                                                {e.is_hidden ? '取消隐藏' : '隐藏'}
                                            </button>
                                            <button onClick={() => handleDelete(e.id)}
                                                    className="px-3 py-1.5 text-xs font-bold rounded-xl border border-red-200/60 text-red-500 bg-[#faf6f0] hover:bg-red-50 transition-all flex items-center gap-1.5">
                                                <Icon name="trash-2" size={14} />
                                                删除
                                            </button>
                                            {e.user_id && readerInfoMap[e.user_id] && (
                                                <button onClick={() => setShowReaderInfo(prev => ({ ...prev, [e.id]: !prev[e.id] }))}
                                                        className={`px-2.5 py-1 text-[10px] font-bold rounded-full border transition-colors ${showReaderInfo[e.id] ? 'bg-indigo-50 text-indigo-600 border-indigo-200' : 'bg-[#faf6f0] text-[#8b7355] border-[#d4c5b2]/40 hover:bg-indigo-50 hover:text-indigo-600'}`}>
                                                    {showReaderInfo[e.id] ? '收起读者信息' : '查看读者信息'}
                                                </button>
                                            )}
                                            <span className="text-[10px] text-[#b8a99a] font-mono">#{String(evalNumberMap.get(e.id) || '?').padStart(4, '0')}</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                                        <div className="flex gap-2">
                                            <span className="text-[#b22222] font-bold shrink-0">Q1 相识</span>
                                            <span className="text-[#2c1810]">{e.q1_meet || '-'}{e.q1_meet_custom ? '（' + e.q1_meet_custom + '）' : ''}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="text-[#b22222] font-bold shrink-0">Q2 关系</span>
                                            <span className="text-[#2c1810]">{e.q2_relation || '-'}{e.q2_relation_custom ? '（' + e.q2_relation_custom + '）' : ''}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="text-[#8b7355] font-bold shrink-0">Q3 第一印象</span>
                                            <span className="text-[#2c1810] italic">{e.q3_first_impression || '未填写'}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="text-[#8b7355] font-bold shrink-0">Q4 寄语</span>
                                            <span className="text-[#2c1810] italic">{e.q5_message || '未填写'}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="text-[#8b7355] font-bold shrink-0">Q5 照片</span>
                                            <span className="text-[#2c1810]">{e.photo_url ? '已上传（见下方预览）' : '未上传'}</span>

                                        <div className="flex gap-2">
                                            <span className="text-[#8b7355] font-bold shrink-0">Q6 身份</span>
                                            <span className="text-[#2c1810] italic">{e.q4_personality || '未填写'}</span>
                                        </div>
                                    </div>

                                    {showReaderInfo[e.id] && readerInfoMap[e.user_id] && (
                                        <div className="mt-4 pt-4 border-t border-[#d4c5b2]/20 bg-gradient-to-r from-indigo-50/50 to-transparent rounded-2xl p-4">
                                            <p className="text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-2">关联读者注册信息</p>
                                            <div className="grid grid-cols-2 gap-x-6 gap-y-2 text-sm">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] font-bold text-[#8b7355] uppercase">姓名</span>

                                                    <span className="text-[#2c1810] font-medium break-all">{readerInfoMap[e.user_id].email || '-'}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] font-bold text-[#8b7355] uppercase">院系</span>
                                                    <span className="text-[#2c1810] font-medium">{readerInfoMap[e.user_id].department || '-'}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] font-bold text-[#8b7355] uppercase">类型</span>
                                                    <span className="text-[#2c1810] font-medium">{READER_TYPES[readerInfoMap[e.user_id].reader_type]?.label || readerInfoMap[e.user_id].reader_type || '-'}</span>

        // ======================== AddBook（支持新增与编辑模式）=======================
        function AddBook({ editBook, onSaved }) {
            const isEditing = !!editBook;
            const DRAFT_KEY = "ADD_BOOK_DRAFT";
            const [f, setF] = useState(() => {
                if (editBook) {
                    return {
                        title: editBook.title || '',
                        isbn: editBook.isbn || '',
                        author: editBook.author || '',
                        category: editBook.category || '计算机科学',
                        total: editBook.total || 1,
                        cover: editBook.cover || '',
                        location: editBook.location || ''
                    };
                }
                const savedDraft = localStorage.getItem(DRAFT_KEY);
                return savedDraft ? JSON.parse(savedDraft) : { title: '', isbn: '', author: '', category: '计算机科学', total: 5, cover: '', location: '' };
            });
            const [pdfFile, setPdfFile] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            useEffect(() => {
                if (!isEditing) localStorage.setItem(DRAFT_KEY, JSON.stringify(f));
            }, [f, isEditing]);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setF(prev => ({ ...prev, cover: ev.target.result }));
                reader.readAsDataURL(file);
            };

            const submit = async (e) => {
                e.preventDefault();
                if (!f.title || !f.isbn) return alert("书名和 ISBN 不能为空");
                if (!f.total || parseInt(f.total) < 1) return alert("入库复本量至少为 1");
                if (!f.location) return alert("请填写馆藏架位");

                if (!isEditing) {
                    const { data: existing } = await supabase.from('books').select('id').eq('isbn', f.isbn).maybeSingle();
                    if (existing) return alert("该书已存在，请检查 ISBN");
                }

                setIsUploading(true);
                let finalPdfUrl = '';
                try {
                    if (pdfFile) {
                        const ext = pdfFile.name.split('.').pop() || 'pdf';
                        const filePath = `book_${Date.now()}.${ext}`;
                        const { error: uploadError } = await supabase.storage.from('books-pdf').upload(filePath, pdfFile);
                        if (uploadError) throw uploadError;
                        const { data: urlData } = supabase.storage.from('books-pdf').getPublicUrl(filePath);
                        finalPdfUrl = urlData.publicUrl;
                    }

                    const newBook = {
                        isbn: f.isbn, title: f.title, author: f.author || '未知',
                        category: f.category, total: parseInt(f.total), available: parseInt(f.total),
                        location: f.location || '密集书库',
                        cover: f.cover || 'https://via.placeholder.com/300x400?text=No+Cover',
                        pdf_url: finalPdfUrl || (editBook?.pdf_url || '')
                    };

                    if (isEditing) {
                        const diff = parseInt(f.total) - (editBook.total || 0);
                        const newAvailable = Math.max(0, (editBook.available || 0) + diff);
                        const { error } = await supabase.from('books').update({
                            ...newBook,
                            available: newAvailable
                        }).eq('id', editBook.id);
                        if (error) throw error;
                        alert("✅ 图书信息已更新成功！");
                    } else {
                        const { error } = await supabase.from('books').insert([newBook]);
                        if (error) throw error;
                        alert("✅ 云端实时同步成功！");
                        setPdfFile(null);
                        setF({ title: '', isbn: '', author: '', category: '计算机科学', total: 5, cover: '', location: '' });
                    }

                    if (onSaved) onSaved();
                } catch (err) {
                    alert("操作失败：" + (err.message || err));
                } finally {
                    setIsUploading(false);
                }
            };

            return (
                <div className="max-w-3xl mx-auto animate-in">
                    <div className="text-center mb-6 sm:mb-10">
                        <h2 className="text-3xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>
                            {isEditing ? '编辑图书信息' : '新文献入库编目'}
                        </h2>
                        <p className="text-[#8b7355] text-sm mt-2">
                            {isEditing ? '修改图书信息后将实时同步至云端馆藏库' : '录入数据将实时同步至云端馆藏库'}
                        </p>
                        {isEditing && (
                            <button onClick={() => { if (onSaved) onSaved(); }}
                                    className="mt-3 text-xs text-[#8b7355] hover:text-[#b22222] underline underline-offset-2 transition-colors">
                                ← 返回新增模式
                            </button>
                        )}
                    </div>
                    <form onSubmit={submit} className="bg-white p-6 sm:p-10 rounded-[3rem] shadow-sm border border-[#d4c5b2]/30 grid grid-cols-1 sm:grid-cols-2 gap-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#b22222]/5 rounded-bl-[100px] -z-10"></div>
                        <Field label="标准书号 (ISBN)" value={f.isbn} onChange={v => setF({ ...f, isbn: v })} placeholder="如: 978-7-302-..." />
                        <Field label="文献正题名" value={f.title} onChange={v => setF({ ...f, title: v })} placeholder="书名" />
                        <Field label="责任者 (作者)" value={f.author} onChange={v => setF({ ...f, author: v })} placeholder="作者编者" />
                        <Field label="中图分类号/类别" value={f.category} onChange={v => setF({ ...f, category: v })} />
                        <Field label="物理馆藏架位" value={f.location} onChange={v => setF({ ...f, location: v })} placeholder="如: 北馆 3F-A1区" />
                        <Field label="馆藏复本量" type="number" value={f.total} onChange={v => setF({ ...f, total: v })} />

                        <div className="col-span-2 space-y-3 p-5 bg-[#faf6f0]/50 rounded-2xl border border-[#d4c5b2]/30">
                            <label className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest">书影采集 (封面图)</label>
                            <div className="flex flex-col md:flex-row items-center gap-6">
                                {f.cover ? (
                                    <img src={f.cover} alt="预览" className="w-28 h-36 object-cover rounded-xl shadow-md border border-[#d4c5b2]/30" />
                                ) : (
                                    <div className="w-28 h-36 border-2 border-dashed border-[#d4c5b2] rounded-xl flex items-center justify-center text-[#b8a99a] bg-white">
                                        <Icon name="image" size={24} />
                                    </div>
                                )}
                                <div className="flex-1 w-full space-y-3">
                                    <input type="file" accept="image/*" onChange={handleFileSelect}
                                           className="w-full text-sm text-[#8b7355] file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-white file:text-[#b22222] file:shadow-sm hover:file:bg-[#b22222]/5 transition-all cursor-pointer" />
                                    <div className="flex items-center gap-2">
                                        <hr className="flex-1 border-[#d4c5b2]/30" />
                                        <span className="text-xs text-[#8b7355] font-medium uppercase">OR</span>
                                        <hr className="flex-1 border-[#d4c5b2]/30" />
                                    </div>
                                    <input type="text" value={f.cover && !f.cover.startsWith('data:') ? f.cover : ''}
                                           onChange={e => setF({ ...f, cover: e.target.value })}
                                           placeholder="在此粘贴网络图片 URL 链接"
                                           className="w-full p-3 bg-white border border-[#d4c5b2]/30 rounded-xl text-sm focus:ring-2 ring-[#8b4513]/30 outline-none transition-all shadow-sm text-[#2c1810]" />
                                </div>
                            </div>
                        </div>

                        <div className="col-span-2 space-y-3 p-5 bg-[#faf6f0]/50 rounded-2xl border border-[#d4c5b2]/30">
                            <label className="text-[10px] font-black text-[#8b7355] uppercase tracking-widest">电子书 PDF 上传</label>
                            <div className="flex flex-col md:flex-row items-center gap-6">
                                {pdfFile ? (
                                    <div className="w-40 h-12 bg-emerald-50 border border-emerald-200 rounded-2xl flex items-center justify-center text-emerald-700 font-medium text-sm gap-2 px-4">
                                        <Icon name="file-text" size={20} />
                                        {pdfFile.name.length > 22 ? pdfFile.name.substring(0, 19) + '...' : pdfFile.name}
                                    </div>
                                ) : (
                                    <div className="w-40 h-12 border-2 border-dashed border-[#d4c5b2] rounded-2xl flex items-center justify-center text-[#b8a99a] bg-white">
                                        <Icon name="file" size={24} />
                                    </div>
                                )}
                                <div className="flex-1 w-full">
                                    <input type="file" accept="application/pdf"
                                           onChange={e => {
                                               const file = e.target.files[0];
                                               if (file) {
                                                   if (file.type !== 'application/pdf') { alert('仅支持 PDF 格式！'); return; }
                                                   setPdfFile(file);
                                               }
                                           }}
                                           className="w-full text-sm text-[#8b7355] file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-white file:text-[#b22222] file:shadow-sm hover:file:bg-[#b22222]/5 transition-all cursor-pointer" />
                                </div>
                            </div>
                            {pdfFile && <p className="text-xs text-emerald-600 mt-1">已选中 • {(pdfFile.size / 1024 / 1024).toFixed(2)} MB</p>}
                        </div>

                        <button type="submit" disabled={isUploading}
                                className="col-span-2 py-4 bg-gradient-to-r from-[#b22222] to-[#8b1a1a] text-white rounded-2xl font-bold mt-4 shadow-lg shadow-[#b22222]/20 active:scale-95 transition-all text-lg tracking-wide disabled:opacity-70 flex items-center justify-center gap-2">
                            {isUploading ? (
                                <><Icon name="loader-2" size={20} className="animate-spin" /> 保存中…</>
                            ) : (
                                <><Icon name={isEditing ? 'check' : 'save'} className="inline-block -mt-1" size={20} /> {isEditing ? '保存修改' : '确认入库并发布'}</>
                            )}
                        </button>
                    </form>
                </div>
            );
        }

        // ======================== 基础组件 ========================
        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick}
                    className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold transition-all ${active ? 'bg-gradient-to-r from-[#2c1810] to-[#4a2c1a] text-white shadow-md' : 'text-[#8b7355] hover:bg-[#faf6f0] hover:text-[#2c1810]'}`}>
                <Icon name={icon} size={18} className={active ? 'text-white' : ''} />
                <span className="text-sm">{label}</span>
            </button>
        );

        const Field = ({ label, value, onChange, type = "text", placeholder, disabled = false }) => (
            <div className="space-y-1.5">
                <label className="text-[10px] font-black text-[#8b7355] uppercase ml-2 tracking-widest">{label}</label>
                <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
                       className="w-full p-3.5 bg-[#faf6f0] border border-[#d4c5b2]/30 rounded-xl text-sm focus:ring-2 ring-[#8b4513]/30 outline-none transition-all disabled:opacity-50 disabled:cursor-not-allowed text-[#2c1810] placeholder-[#b8a99a]" required />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
