<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com https://fonts.googleapis.com https://www.gstatic.com https://agakzhlswzimjylewvcg.supabase.co wss://agakzhlswzimjylewvcg.supabase.co; img-src 'self' data: https: blob:; media-src 'self' https:;">
    <title>小羽书屋 · 数字化馆藏管理</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif SC', 'PingFang SC', serif; }
        .animate-in { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .book-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(44,24,16,0.1); }
    </style>
</head>
<body class="bg-[#faf6f0] text-[#2c1810]">
    <div id="root"></div>

    <script type="text/babel">
        const SUPABASE_URL = 'https://agakzhlswzimjylewvcg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YzYzzdOVSQzaNr1s3KjtLQ_KyHXfs5P';
        const supabase = (window.supabasejs || window.supabase).createClient(SUPABASE_URL, SUPABASE_KEY);

        const { useState, useEffect, useMemo, useRef, createElement } = React;

        // ======================== Icon 组件 ========================
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = window.lucide && window.lucide.icons;
            if (!icons || !icons[name]) return null;
            const attrs = { width: size, height: size, stroke: "currentColor", fill: "none",
                "stroke-width": 1.5, "stroke-linecap": "round", "stroke-linejoin": "round",
                className: `lucide lucide-${name} ${className}` };
            const children = icons[name].map((tag, i) => createElement(tag[0], { key: i, ...(tag[1] || {}) }));
            return createElement("svg", attrs, ...children);
        };

        // ======================== LogoImg 组件（带文字占位）=======================
        const LogoImg = () => {
            const [failed, setFailed] = React.useState(false);
            if (failed) {
                return React.createElement("div",
                    { className: "w-full h-full flex items-center justify-center text-white font-black text-xl", style: { fontFamily: 'serif' } },
                    "書"
                );
            }
            return React.createElement("img", {
                src: "./assets/logo2.jpg",
                alt: "小羽书屋",
                className: "w-full h-full object-cover",
                onError: () => setFailed(true)
            });
        };

        // ======================== 通知配置 ========================
        const NOTIFY_CONFIG = {
            enabled: true,
            type: 'serverchan',
            serverChanKey: 'SCT345313Tdstay9vuHPBIOHLGy4gQsbel',
            feishuWebhook: 'https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_TOKEN',
            customWebhook: ''
        };

        const READER_TYPES = {
            'UNDERGRAD': { label: '本科生', limit: 10 },
            'POSTGRAD': { label: '研究生', limit: 20 },
            'STAFF': { label: '教职工', limit: 30 },
            'ADMIN': { label: '管理员', limit: 99 },
            'GUEST': { label: '游客', limit: 0 }
        };

        async function sendNewReaderNotification(reader) {
            if (!NOTIFY_CONFIG.enabled) return;
            const title = '📚 新读者注册通知';
            const content =
                `读者姓名：${reader.name}\n` +
                `手机号：${reader.account}\n` +
                `院系/部门：${reader.department}\n` +
                `读者类型：${READER_TYPES[reader.readerType]?.label || '未知'}\n` +
                `注册时间：${new Date().toLocaleString('zh-CN')}`;
            try {
                if (NOTIFY_CONFIG.type === 'serverchan') {
                    await fetch(`https://sctapi.ftqq.com/${NOTIFY_CONFIG.serverChanKey}.send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: `title=${encodeURIComponent(title)}&desp=${encodeURIComponent(content)}`
                    });
                } else if (NOTIFY_CONFIG.type === 'feishu') {
                    await fetch(NOTIFY_CONFIG.feishuWebhook, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ msg_type: 'text', content: { text: title + '\n\n' + content } })
                    });
                } else if (NOTIFY_CONFIG.type === 'custom' && NOTIFY_CONFIG.customWebhook) {
                    await fetch(NOTIFY_CONFIG.customWebhook, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content, reader })
                    });
                }
            } catch (e) { console.warn('通知发送失败（不影响注册）:', e); }
        }

        // ======================== buildUser ========================
        function buildUser(session) {
            if (!session) return null;
            const u = session.user;
            return {
                id: u.id,
                account: u.email,
                email: u.email,
                name: u.user_metadata?.name || u.email?.split('@')[0] || '读者',
                department: u.user_metadata?.department || '未知院系',
                readerType: u.user_metadata?.readerType || 'UNDERGRAD',
                role: u.user_metadata?.role || 'READER',
                status: 'ACTIVE',
                phone: u.phone || u.user_metadata?.phone || '',
                is_admin: u.user_metadata?.is_admin === true
            };
        }

        // ======================== App ========================
        function App() {
            const [user, setUser] = useState(null);
            const [authReady, setAuthReady] = useState(false);
            const [db, setDb] = useState({ users: [], books: [], borrowings: [] });

            // Supabase Auth 监听（兼容管理员本地 Session 与手机验证码登录）
            useEffect(() => {
                let cancelled = false;
                const localSession = localStorage.getItem("USER_SESSION");
                // 安全超时：5 秒后无论结果如何都结束 loading
                const safetyTimer = setTimeout(() => {
                    if (!cancelled) {
                        if (localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                setUser(parsed);
                            } catch(e) { localStorage.removeItem("USER_SESSION"); }
                        }
                        setAuthReady(true);
                    }
                }, 5000);

                try {
                    supabase.auth.getSession().then(({ data: { session } }) => {
                        if (cancelled) return;
                        clearTimeout(safetyTimer);
                        const supabaseUser = buildUser(session);
                        if (supabaseUser) {
                            setUser(supabaseUser);
                        } else if (localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                if ((parsed.role === 'ADMIN' && parsed.is_admin === true)) {
                                    setUser(parsed);
                                }
                            } catch(e) { localStorage.removeItem("USER_SESSION"); }
                        }
                        setAuthReady(true);
                    }).catch(() => {
                        if (cancelled) return;
                        clearTimeout(safetyTimer);
                        if (localSession) {
                            try {
                                const parsed = JSON.parse(localSession);
                                setUser(parsed);
                            } catch(e) { localStorage.removeItem("USER_SESSION"); }
                        }
                        setAuthReady(true);
                    });
                } catch(e) {
                    clearTimeout(safetyTimer);
                    if (localSession) {
                        try {
                            const parsed = JSON.parse(localSession);
                            setUser(parsed);
                        } catch(_) { localStorage.removeItem("USER_SESSION"); }
                    }
                    setAuthReady(true);
                }

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    const u = buildUser(session);
                    if (u) {
                        setUser(u);
                        localStorage.setItem("USER_SESSION", JSON.stringify(u));
                    } else {
                        const local = localStorage.getItem("USER_SESSION");
                        if (local) {
                            try {
                                const parsed = JSON.parse(local);
                                if ((parsed.role === 'ADMIN' && parsed.is_admin === true)) {
                                    return;
                                }
                            } catch(e) {}
                        }
                        setUser(null);
                        localStorage.removeItem("USER_SESSION");
                    }
                });
                return () => {
                    cancelled = true;
                    clearTimeout(safetyTimer);
                    subscription.unsubscribe();
                };
            }, []);

            // 加载图书
            useEffect(() => {
                if (!authReady) return;
                const fetchBooks = async () => {
                    const { data, error } = await supabase.from('books').select('*').order('created_at', { ascending: false });
                    if (!error && data) {
                        if (data.length === 0) {
                            // 自动 seed
                            try {
                                const resp = await fetch('data.json');
                                if (resp.ok) {
                                    const seedData = await resp.json();
                                    const { error: seedErr } = await supabase.from('books').insert(
                                        seedData.map(({ id, created_at, ...b }) => b)
                                    );
                                    if (!seedErr) {
                                        const { data: fresh } = await supabase.from('books').select('*').order('created_at', { ascending: false });
                                        if (fresh) setDb(prev => ({ ...prev, books: fresh }));
                                        return;
                                    }
                                }
                            } catch (_) {}
                        }
                        setDb(prev => ({ ...prev, books: data }));
                    }
                };
                fetchBooks();
                const channel = supabase.channel('books_realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'books' }, () => fetchBooks())
                    .subscribe();
                return () => { supabase.removeChannel(channel); };
            }, [authReady]);

            // 加载本地借阅记录
            useEffect(() => {
                const saved = localStorage.getItem("THU_LIB_BORROW");
                if (saved) setDb(prev => ({ ...prev, borrowings: JSON.parse(saved) }));
            }, []);
            useEffect(() => {
                if (db.borrowings.length > 0) localStorage.setItem("THU_LIB_BORROW", JSON.stringify(db.borrowings));
            }, [db.borrowings]);

            const logout = async () => {
                await supabase.auth.signOut();
                setUser(null);
                localStorage.removeItem("USER_SESSION");
            };

            const handleGuestLogin = () => {
                const guestToken = 'gt_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 10);
                const guestUser = {
                    id: 'guest_' + Date.now(),
                    account: 'guest',
                    email: '',
                    name: '游客',
                    department: '访客',
                    readerType: 'GUEST',
                    role: 'GUEST',
                    status: 'ACTIVE',
                    phone: '',
                    guest_token: guestToken,
                    is_admin: false
                };
                localStorage.setItem("USER_SESSION", JSON.stringify(guestUser));
                setUser(guestUser);
            };

            if (!authReady) {
                return (
                    <div className="h-screen flex items-center justify-center bg-[#faf6f0]">
                        <div className="text-center">
                            <div className="w-16 h-16 mx-auto mb-5 rounded-full flex items-center justify-center overflow-hidden shadow-lg">
                                <LogoImg />
                            </div>
                            <p className="text-[#8b7355] text-sm">正在叩门…</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {user ? (
                        <Dashboard user={user} db={db} setDb={setDb} onLogout={logout} />
                    ) : (
                        <LoginPage db={db} setDb={setDb} onGuestLogin={handleGuestLogin} onLogin={setUser} />
                    )}
                </div>
            );
        }

        // ======================== 邮箱验证码发送（调用 Supabase Edge Function） ========================
        async function sendEmailOTP(email) {
            try {
                const { data, error } = await supabase.functions.invoke('send-otp', {
                    body: { email: email.trim().toLowerCase() }
                });
                if (error) return { success: false, code: error.message || '验证码发送失败' };
                if (data && data.success) return { success: true };
                return { success: false, code: (data && data.error) || '验证码发送失败' };
            } catch(e) {
                return { success: false, code: '网络异常，请稍后重试' };
            }
        }

        // 验证码校验（调用 Edge Function）
        async function verifyEmailOTP(email, code) {
            const { data, error } = await supabase.functions.invoke('verify-otp', {
                body: { email: email.trim().toLowerCase(), code }
            });
            if (error) return { success: false, msg: error.message || '验证码错误' };
            if (data && data.success) return { success: true };
            return { success: false, msg: '验证码错误或已过期' };
        }

        // ======================== LoginPage ========================
        function LoginPage({ db, setDb, onGuestLogin, onLogin }) {
            const [step, setStep] = useState('init'); // init | code | password | success
            const [adminMode, setAdminMode] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPw, setConfirmPw] = useState('');
            const [registerName, setRegisterName] = useState('');
            const [showPw, setShowPw] = useState(false);
            const [showConfirmPw, setShowConfirmPw] = useState(false);
            const [code, setCode] = useState(['', '', '', '', '', '']);
            const [loading, setLoading] = useState(false);
            const [msg, setMsg] = useState(null);
            const [codeErr, setCodeErr] = useState('');
            const [countdown, setCountdown] = useState(0);
            const [redirecting, setRedirecting] = useState(false);
            const otpRefs = [useRef(null), useRef(null), useRef(null), useRef(null), useRef(null), useRef(null)];

            // 倒计时
            useEffect(() => {
                if (countdown > 0) {
                    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
                    return () => clearTimeout(t);
                }
            }, [countdown]);

            const startCountdown = () => { setCountdown(60); setTimeout(() => otpRefs[0].current?.focus(), 150); };

            const handleCodeChange = (val, idx) => {
                const v = val.replace(/\D/g, '').slice(0, 1);
                const next = [...code]; next[idx] = v;
                setCode(next); setCodeErr('');
                if (v && idx < 5) otpRefs[idx + 1].current?.focus();
            };
            const handleCodeKey = (e, idx) => {
                if (e.key === 'Backspace' && !code[idx] && idx > 0) otpRefs[idx - 1].current?.focus();
            };

            // 主入口：进入
            const handleEnter = async () => {
                const raw = email.trim();
                const e = raw.toLowerCase();
                // 管理员模式：支持邮箱或手机号
                const isPhone = /^1[3-9]\d{9}$/.test(raw);

                if (adminMode) {
                    if (!raw) return setMsg({ type: 'warn', text: '请输入管理员邮箱或手机号' });
                    if (password.length < 6) return setMsg({ type: 'warn', text: '密码至少 6 位' });
                    setLoading(true); setMsg(null);

                    // 管理员登录（支持手机号或邮箱）
                    const isAdminAccount = (raw === '18723992791' || e === 'admin@library.cn');
                    if (isAdminAccount && password === 'rqy18723992791') {
                        const adminUser = {
                            id: 'admin_' + Date.now(),
                            account: raw,
                            email: e === 'admin@library.cn' ? e : '',
                            name: '系统管理员',
                            department: '图书馆',
                            readerType: 'ADMIN',
                            role: 'ADMIN',
                            status: 'ACTIVE',
                            phone: raw === '18723992791' ? raw : '',
                            is_admin: true
                        };
                        localStorage.setItem("USER_SESSION", JSON.stringify(adminUser));
                        setRedirecting(true);
                        setTimeout(() => onLogin(adminUser), 300);
                    } else {
                        setMsg({ type: 'err', text: '管理员账号或密码错误' });
                        setLoading(false);
                    }
                    return;
                }

                // 普通用户：校验邮箱格式
                if (!e || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) return setMsg({ type: 'warn', text: '请输入有效的邮箱地址' });
                if (password.length < 6) return setMsg({ type: 'warn', text: '密码至少 6 位' });
                setLoading(true); setMsg(null);

                // 普通用户：检查邮箱是否已注册
                try {
                    const { data: existing } = await supabase.from('readers').select('id').eq('email', e).maybeSingle();

                    if (existing) {
                        // 已注册 → 尝试登录
                        const { data: authData, error: signInErr } = await supabase.auth.signInWithPassword({ email: e, password });
                        if (signInErr) {
                            // 区分凭证无效和其他错误
                            if (signInErr.message === 'Invalid login credentials') {
                                setMsg({ type: 'err', text: '密码错误，请重新输入' });
                            } else {
                                setMsg({ type: 'warn', text: '该 QQ 邮箱已注册，请直接登录。如忘记密码，请联系管理员重置。' });
                            }
                            setLoading(false);
                            return;
                        }
                        const u = authData.user;
                        const userData = {
                            id: u.id,
                            account: e,
                            email: e,
                            name: u.user_metadata?.name || e.split('@')[0],
                            department: u.user_metadata?.department || '未知院系',
                            readerType: u.user_metadata?.readerType || 'UNDERGRAD',
                            role: u.user_metadata?.role || 'READER',
                            status: 'ACTIVE',
                            phone: '',
                            is_admin: false
                        };
                        localStorage.setItem("USER_SESSION", JSON.stringify(userData));
                        setRedirecting(true);
                        setTimeout(() => onLogin(userData), 300);
                    } else {
                        // 未在 readers 表中找到 → 额外检查 Supabase Auth 中是否已存在
                        const { error: checkAuthErr } = await supabase.auth.signInWithPassword({ email: e, password: '_check_exists_' + Date.now() });
                        if (checkAuthErr && checkAuthErr.message !== 'Invalid login credentials') {
                            // 非 "Invalid login credentials" 之外的错误，说明无法确定，继续流程
                        } else if (checkAuthErr && checkAuthErr.message === 'Invalid login credentials') {
                            // 该邮箱在 Supabase Auth 中已存在（但 readers 表无记录），拦截注册
                            setMsg({ type: 'warn', text: '该 QQ 邮箱已注册，请直接登录。' });
                            setLoading(false);
                            return;
                        }

                        // 未注册 → 发送验证码
                        const result = await sendEmailOTP(e);
                        if (!result.success) {
                            setMsg({ type: 'err', text: '验证码发送失败：' + (result.code || '请稍后重试') });
                            setLoading(false);
                            return;
                        }
                        setMsg({ type: 'ok', text: '验证码已发送至 ' + e + '，5 分钟内有效' });
                        setStep('code');
                        startCountdown();
                        setLoading(false);
                    }
                } catch(err) {
                    setMsg({ type: 'err', text: '网络异常：' + (err.message || '请稍后重试') });
                    setLoading(false);
                }
            };

            // 验证验证码
            const handleVerifyCode = async () => {
                const codeStr = code.join('');
                if (codeStr.length !== 6) return setCodeErr('请输入完整 6 位验证码');
                setLoading(true); setCodeErr('');
                const result = await verifyEmailOTP(email.trim().toLowerCase(), codeStr);
                if (!result.success) {
                    setCodeErr(result.msg || '验证码错误或已过期，请重新获取');
                    setLoading(false);
                    return;
                }
                setMsg(null);
                setStep('password');
                setLoading(false);
            };

            // 重新发送验证码
            const handleResendCode = async () => {
                if (countdown > 0) return;
                setCode(['', '', '', '', '', '']); setCodeErr('');
                setLoading(true);
                const result = await sendEmailOTP(email.trim().toLowerCase());
                if (result.success) {
                    setMsg({ type: 'ok', text: '验证码已重新发送' });
                    startCountdown();
                } else {
                    setMsg({ type: 'err', text: '发送失败：' + (result.code || '请稍后重试') });
                }
                setLoading(false);
            };

            // 完成注册
            const handleCompleteRegister = async () => {
                const e = email.trim().toLowerCase();
                if (password.length < 6) return setMsg({ type: 'warn', text: '密码至少 6 位' });
                if (password !== confirmPw) return setMsg({ type: 'warn', text: '两次密码输入不一致' });
                if (!registerName.trim()) return setMsg({ type: 'warn', text: '请填写您的姓名' });
                setLoading(true); setMsg(null);

                try {
                    const { data, error } = await supabase.functions.invoke('create-auth-user', {
                        body: { email: e, password, name: registerName.trim() }
                    });
                    if (error || !data?.success) {
                        setMsg({ type: 'err', text: '注册失败：' + (error?.message || data?.error || '未知错误') });
                        setLoading(false);
                        return;
                    }

                    // 自动登录
                    const { data: signInData, error: signInErr } = await supabase.auth.signInWithPassword({ email: e, password });
                    if (signInErr) {
                        setMsg({ type: 'err', text: '注册成功，但自动登录失败，请返回登录页' });
                        setLoading(false);
                        return;
                    }

                    const userData = {
                        id: signInData.user.id,
                        account: e,
                        email: e,
                        name: registerName.trim(),
                        department: '未知院系',
                        readerType: 'UNDERGRAD',
                        role: 'READER',
                        status: 'ACTIVE',
                        phone: '',
                        is_admin: false
                    };
                    localStorage.setItem("USER_SESSION", JSON.stringify(userData));
                    setLoading(false);
                    setMsg(null);
                    setRedirecting(true);
                    setTimeout(() => onLogin(userData), 200);
                } catch(err) {
                    setMsg({ type: 'err', text: '注册异常：' + (err.message || '请稍后重试') });
                    setLoading(false);
                }
            };

            const resetToInit = () => {
                setStep('init'); setMsg(null); setCodeErr('');
                setCode(['', '', '', '', '', '']); setCountdown(0);
                setPassword(''); setConfirmPw(''); setRegisterName(''); setShowPw(false); setShowConfirmPw(false);
            };

            const cls = {
                input: 'w-full p-4 bg-[#faf6f0] border border-[#d4c5b2] rounded-xl outline-none focus:ring-2 ring-[#8b4513]/30 transition-all text-[#2c1810] placeholder-[#b8a99a]',
                btn: 'w-full py-4 rounded-xl font-bold text-white shadow-lg transition-all active:scale-95 disabled:opacity-60 flex items-center justify-center gap-2',
            };
            const accentColor = adminMode ? '#660874' : '#b22222';
            const accentGradient = adminMode
                ? 'bg-gradient-to-r from-[#660874] to-[#4a0656] shadow-[#660874]/20'
                : 'bg-gradient-to-r from-[#b22222] to-[#8b1a1a] shadow-[#b22222]/20';

            function EyeIcon({ visible, onClick }) {
                return (
                    <button type="button" onClick={onClick}
                            className="absolute right-4 top-1/2 -translate-y-1/2 text-[#b8a99a] hover:text-[#8b7355] transition-colors p-1">
                        <Icon name={visible ? 'eye' : 'eye-off'} size={20} />
                    </button>
                );
            }

            return (
                <div className="h-screen flex items-center justify-center bg-[#faf6f0] relative overflow-hidden">
                    {/* 全屏 Loading 遮罩 */}
                    {redirecting && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-[#faf6f0]/80 backdrop-blur-sm">
                            <div className="text-center">
                                <div className={`w-16 h-16 mx-auto mb-5 rounded-full flex items-center justify-center overflow-hidden shadow-lg ${adminMode ? 'ring-2 ring-[#660874]/30' : ''}`}>
                                    <LogoImg />
                                </div>
                                <p className="text-[#8b7355] text-sm font-medium">执钥中，请稍候…</p>
                            </div>
                        </div>
                    )}
                    <div className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-[0.06]"
                         style={{ backgroundImage: 'radial-gradient(circle at 20% 30%, #2c1810 1px, transparent 1px), radial-gradient(circle at 80% 70%, #2c1810 1px, transparent 1px)', backgroundSize: '60px 60px' }} />
                    <div className="absolute top-[-15%] left-[-10%] w-[55%] h-[55%] bg-[#8b4513] blur-[150px] rounded-full opacity-[0.06]" />
                    <div className="absolute bottom-[-15%] right-[-10%] w-[55%] h-[55%] bg-[#2c1810] blur-[150px] rounded-full opacity-[0.04]" />

                    <div className="w-[90%] max-w-[440px] p-6 sm:p-10 bg-white rounded-[3rem] shadow-2xl shadow-[#2c1810]/10 relative z-10 animate-in border border-[#d4c5b2]/30">
                        <div className="text-center mb-8">
                            <div className={`w-16 h-16 mx-auto mb-5 rounded-full flex items-center justify-center overflow-hidden shadow-lg ${adminMode ? 'ring-2 ring-[#660874]/30' : ''}`}>
                                <LogoImg />
                            </div>
                            <h1 className="text-2xl font-black tracking-widest text-[#2c1810]" style={{ fontFamily: 'serif' }}>小羽书屋</h1>
                            {adminMode && <p className="text-[11px] font-bold text-[#660874] tracking-[0.2em] mt-1">清华大学 · 馆藏管理系统</p>}
                            <p className="text-[#8b7355] text-xs mt-2 tracking-wider">
                                {step === 'success' ? '验印通过 · 即将入阁'
                                    : step === 'code' ? '验印 · 查收飞鸽'
                                    : step === 'password' ? '投帖 · 落笔留名'
                                    : adminMode ? '馆长 · 执钥入阁' : '投帖 · 叩门入阁'}
                            </p>
                        </div>

                        {msg && (
                            <div className={`mb-5 p-4 rounded-2xl font-medium animate-in ${
                                msg.type === 'ok' ? 'bg-[#f0f7f0] text-[#2d5a27] border border-[#c8e6c9] text-sm' :
                                msg.type === 'err' ? 'bg-[#fef2f2] text-red-500 border border-[#fecaca] text-xs' :
                                'bg-[#fefce8] text-[#854d0e] border border-[#fef08a] text-sm'}`}>
                                {msg.text}
                            </div>
                        )}

                        {step === 'success' ? (
                            <div className="text-center space-y-5 py-6">
                                <div className="text-4xl">📜</div>
                                <p className="text-[#2c1810] font-bold text-lg" style={{ fontFamily: 'serif' }}>名帖已投，验印通过</p>
                                <p className="text-sm text-[#8b7355] leading-relaxed">正在为您打开阁门…</p>
                            </div>
                        ) : step === 'code' ? (
                            <div className="space-y-6">
                                <p className="text-center text-sm text-[#8b7355] leading-relaxed">
                                    验证码已发送至<br /><span className="font-bold text-[#2c1810] break-all">{email}</span><br />请输入 6 位验证码
                                </p>
                                <div className="flex justify-center gap-2.5">
                                    {code.map((d, i) => (
                                        <input key={i} ref={otpRefs[i]} value={d}
                                               onChange={e => handleCodeChange(e.target.value, i)}
                                               onKeyDown={e => handleCodeKey(e, i)} maxLength={1}
                                               className="w-12 h-14 text-center text-xl font-black text-[#2c1810] bg-[#faf6f0] border-2 border-[#d4c5b2] rounded-xl outline-none focus:border-[#b22222] focus:ring-2 ring-[#b22222]/20 transition-all"
                                               style={{ fontFamily: 'monospace' }} />
                                    ))}
                                </div>
                                {codeErr && (
                                    <div className="p-3 bg-[#fef2f2] border border-[#fecaca] text-[#991b1b] rounded-xl text-sm text-center font-medium">{codeErr}</div>
                                )}
                                <button onClick={handleVerifyCode} disabled={loading || redirecting}
                                        className={cls.btn + ' bg-gradient-to-r from-[#2c1810] to-[#4a2c1a] shadow-[#2c1810]/20'}>
                                    {loading ? <><Icon name="loader-2" size={18} className="animate-spin" /> 验证中…</> : '验证并继续'}
                                </button>
                                <div className="flex justify-between text-xs">
                                    <button onClick={handleResendCode} disabled={countdown > 0 || loading}
                                            className={`transition-colors font-bold ${countdown > 0 ? 'text-[#b8a99a] cursor-not-allowed' : 'text-[#8b7355] hover:text-[#b22222]'}`}>
                                        {countdown > 0 ? `${countdown}s 后重新发送` : '⟳ 重新发送'}
                                    </button>
                                    <button onClick={() => { setStep('init'); setMsg(null); setCode(['', '', '', '', '', '']); setCodeErr(''); setCountdown(0); }}
                                            className="text-[#8b7355] hover:text-[#2c1810] transition-colors font-bold">← 修改邮箱</button>
                                </div>
                            </div>
                        ) : step === 'password' ? (
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">姓名 *</label>
                                    <input value={registerName} onChange={e => setRegisterName(e.target.value)}
                                           className={cls.input} placeholder="请输入您的真实姓名" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">设置密码</label>
                                    <div className="relative">
                                        <input type={showPw ? 'text' : 'password'} value={password}
                                               onChange={e => setPassword(e.target.value)}
                                               className={cls.input + ' pr-12'} placeholder="至少 6 位密码" />
                                        <EyeIcon visible={showPw} onClick={() => setShowPw(!showPw)} />
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">确认密码</label>
                                    <div className="relative">
                                        <input type={showConfirmPw ? 'text' : 'password'} value={confirmPw}
                                               onChange={e => setConfirmPw(e.target.value)}
                                               className={cls.input + ' pr-12'} placeholder="再次输入密码" />
                                        <EyeIcon visible={showConfirmPw} onClick={() => setShowConfirmPw(!showConfirmPw)} />
                                    </div>
                                </div>
                                <button onClick={handleCompleteRegister} disabled={loading || redirecting}
                                        className={cls.btn + ' bg-gradient-to-r from-[#b22222] to-[#8b1a1a] shadow-[#b22222]/20 mt-2'}>
                                    {loading ? <><Icon name="loader-2" size={18} className="animate-spin" /> 注册中…</> : '完成注册 · 入阁'}
                                </button>
                                <p className="text-center text-sm text-[#8b7355] pt-1 cursor-pointer hover:text-[#2c1810] transition-colors"
                                   onClick={() => { setStep('code'); setMsg(null); setConfirmPw(''); }}>
                                    ← 返回上一步
                                </p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">邮箱</label>
                                    <input value={email} onChange={e => setEmail(e.target.value)}
                                           className={cls.input} placeholder={adminMode ? "管理员邮箱" : "your@email.com"} type="text" inputMode="email" autoComplete="email" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-[#8b7355] uppercase ml-2 tracking-widest">密码</label>
                                    <div className="relative">
                                        <input type={showPw ? 'text' : 'password'} value={password}
                                               onChange={e => setPassword(e.target.value)}
                                               className={cls.input + ' pr-12'} placeholder={adminMode ? "管理员密码" : "至少 6 位密码"} />
                                        <EyeIcon visible={showPw} onClick={() => setShowPw(!showPw)} />
                                    </div>
                                </div>
                                <button onClick={handleEnter} disabled={loading || redirecting}
                                        className={cls.btn + (adminMode ? ' bg-gradient-to-r from-[#660874] to-[#4a0656] shadow-[#660874]/20' : ' bg-gradient-to-r from-[#2c1810] to-[#4a2c1a] shadow-[#2c1810]/20') + ' mt-2'}>
                                    {loading ? <><Icon name="loader-2" size={18} className="animate-spin" /> 验证中…</> : (adminMode ? '馆长执钥入阁' : '叩门 · 入阁览卷')}
                                </button>
                                <p className="text-center text-xs text-[#8b7355] pt-1 leading-relaxed">
                                    {adminMode ? '' : '未注册的邮箱将自动开启注册流程'}
                                </p>
                                {!adminMode && (
                                    <button onClick={onGuestLogin}
                                            className="w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 bg-[#d4c5b2] border-2 border-[#8b7355] text-[#2c1810] mt-2">
                                        <Icon name="coffee" size={18} /> 跳过登录 / 先去逛逛
                                    </button>
                                )}
                                <p className={`text-center text-[10px] pt-3 cursor-pointer hover:opacity-80 transition-opacity font-bold tracking-wider ${adminMode ? 'text-[#660874]' : 'text-[#b8a99a]'}`}
                                   onClick={() => { setAdminMode(!adminMode); setMsg(null); setPassword(''); setEmail(''); setShowPw(false); }}>
                                    {adminMode ? '← 返回普通读者登录' : '🔑 管理员入口'}
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ======================== Dashboard ========================
        function Dashboard({ user, db, setDb, onLogout }) {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [view, setView] = useState(user.is_admin ? 'admin_home' : 'reader_home');
            const [search, setSearch] = useState('');
            const [editingBook, setEditingBook] = useState(null);

            // 非管理员过滤隐藏图书
            const visibleBooks = user && user.is_admin
                ? db.books
                : (db.books || []).filter(b => !b.is_hidden);

            const filteredBooks = visibleBooks.filter(b => b.title.includes(search) || b.isbn.includes(search) || (b.author && b.author.includes(search)));

            const handleEditBook = (book) => {
                setEditingBook(book);
                setView('add');
            };

            const borrowBook = (book) => {
                if (user.role === 'GUEST') return alert("借阅功能需要登录账号，请先登录或注册。");
                if (user.status !== 'ACTIVE') return alert("您的账号状态异常，暂无借阅权限！");
                if (book.available <= 0) return alert("暂无库存，请留意归还动态");
                const currentCount = db.borrowings.filter(b => b.userId === user.id && b.status === 'BORROWED').length;
                const limit = READER_TYPES[user.readerType || 'UNDERGRAD']?.limit || 5;
                if (currentCount >= limit) return alert(`您当前的借阅额度为 ${limit} 本，已达上限！`);
                const newBooks = db.books.map(b => b.id === book.id ? { ...b, available: b.available - 1 } : b);
                const dueDate = new Date(); dueDate.setDate(dueDate.getDate() + 30);
                const newBorrow = {
                    id: Date.now().toString(), userId: user.id, bookId: book.id,
                    bookTitle: book.title, date: new Date().toLocaleDateString(),
                    due: dueDate.toLocaleDateString(), status: 'BORROWED'
                };
                setDb({ ...db, books: newBooks, borrowings: [newBorrow, ...db.borrowings] });
                alert("借阅成功！请在 30 日内归还。");
            };

            const deleteBook = async (book) => {
                const bookId = book.id || book;
                const bookTitle = book.title || '该图书';
                // 权限校验：非管理员禁止删除
                if (!user || !user.is_admin) {
                    return alert('权限不足，仅管理员可执行下架操作。');
                }
                if (!confirm(`确定要从书库中永久移除《${bookTitle}》吗？`)) return;
                const { error } = await supabase.from('books').delete().eq('id', bookId);
                if (error) { alert("删除失败：" + error.message); return; }
                setDb(prev => ({ ...prev, books: prev.books.filter(b => b.id !== bookId) }));
            };

            const handleToggleBookHide = async (book, currentHidden) => {
                const action = currentHidden ? '取消隐藏' : '隐藏';
                const bookTitle = book.title || '该图书';
                if (!confirm(`确定要${action}《${bookTitle}》吗？`)) return;
                const { error } = await supabase.from('books').update({ is_hidden: !currentHidden }).eq('id', book.id);
                if (error) { alert('操作失败：' + error.message); return; }
                setDb(prev => ({
                    ...prev,
                    books: prev.books.map(b => b.id === book.id ? { ...b, is_hidden: !currentHidden } : b)
                }));
            };

            return (
                <div className="flex h-screen overflow-hidden w-full max-w-full relative">
                    {/* Mobile hamburger */}
                    <div className="lg:hidden fixed top-4 left-4 z-30 flex flex-col items-center">
                        <button onClick={() => setSidebarOpen(prev => !prev)}
                                className="w-11 h-11 bg-white rounded-2xl shadow-lg border border-[#d4c5b2]/40 flex flex-col items-center justify-center gap-[3px] text-[#2c1810] hover:bg-[#faf6f0] active:scale-90 transition-all group"
                                aria-label={sidebarOpen ? '收起导航菜单' : '展开导航菜单'}>
                            <span className="block w-[18px] h-[2px] bg-[#2c1810] rounded-full transition-all group-hover:bg-[#b22222]"></span>
                            <span className="block w-[18px] h-[2px] bg-[#2c1810] rounded-full transition-all group-hover:bg-[#b22222]"></span>
                            <span className="block w-[18px] h-[2px] bg-[#2c1810] rounded-full transition-all group-hover:bg-[#b22222]"></span>
                        </button>
                        <span className="mt-1.5 text-[10px] font-bold text-[#8b7355] bg-white/80 backdrop-blur-sm px-2 py-0.5 rounded-full shadow-sm border border-[#d4c5b2]/20 whitespace-nowrap transition-all">
                            {sidebarOpen ? '点击收起' : '点击展开'}
                        </span>
                    </div>

                    {/* Mobile drawer backdrop */}
                    {sidebarOpen && (
                        <div className="fixed inset-0 bg-black/40 z-20 lg:hidden" onClick={() => setSidebarOpen(false)} />
                    )}

                    {/* Sidebar - drawer on mobile, static sidebar on lg+ */}
                    <aside className={`w-72 border-r border-[#d4c5b2]/30 bg-white p-8 flex flex-col z-20 shadow-sm fixed inset-y-0 left-0 transition-transform duration-300 lg:relative lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-12 h-12 rounded-xl flex items-center justify-center overflow-hidden shadow-lg shadow-[#b22222]/20">
                                <LogoImg />
                            </div>
                            <h2 className="text-xl font-black tracking-tighter text-[#2c1810]" style={{ fontFamily: 'serif' }}>小羽书屋</h2>
                            <button onClick={() => setSidebarOpen(false)} className="lg:hidden ml-auto p-2 text-[#8b7355] hover:bg-[#faf6f0] rounded-full transition-colors">
                                <Icon name="x" size={20} />
                            </button>
                        </div>

                        <div className="flex-1 space-y-1.5">
                            <NavBtn icon="home" label="系统首页" active={view.includes('home')}
                                    onClick={() => { setView(user.is_admin ? 'admin_home' : 'reader_home'); setSidebarOpen(false); }} />
                            <NavBtn icon="search" label="馆藏检索" active={view === 'search'} onClick={() => { setView('search'); setSidebarOpen(false); }} />
                            <NavBtn icon="bookmark" label="我的借阅" active={view === 'my'} onClick={() => { setView('my'); setSidebarOpen(false); }} />
                            <NavBtn icon="pen-line" label="书屋评价" active={view === 'eval_form'} onClick={() => { setView('eval_form'); setSidebarOpen(false); }} />
                            {user.is_admin === true && (
                                <div className="mt-8 pt-6 border-t border-[#d4c5b2]/30">
                                    <p className="text-[10px] font-bold text-[#8b7355] uppercase mb-3 px-4 tracking-widest">馆务管理</p>
                                    <NavBtn icon="plus-circle" label="图书入库编目" active={view === 'add'} onClick={() => { setView('add'); setEditingBook(null); setSidebarOpen(false); }} />
                                    <NavBtn icon="users" label="读者信息管理" active={view === 'users'} onClick={() => { setView('users'); setSidebarOpen(false); }} />
                                    <NavBtn icon="messages-square" label="匿名评价管理" active={view === 'eval_admin'} onClick={() => { setView('eval_admin'); setSidebarOpen(false); }} />
                                </div>
                            )}
                        </div>

                        <div className="mt-auto pt-6 border-t border-[#d4c5b2]/30">
                            <div className="flex items-center gap-3 mb-4 px-4 bg-[#faf6f0] p-3 rounded-2xl">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-[#b22222] ${user.role === 'GUEST' ? 'bg-[#8b7355]/10 text-[#8b7355]' : 'bg-[#b22222]/10'}`}
                                     style={{ fontFamily: 'serif' }}>{user.name[0]}</div>
                                <div className="min-w-0">
                                    <p className="text-sm font-bold truncate text-[#2c1810]">{user.name}</p>
                                    <p className="text-[10px] text-[#8b7355] font-bold tracking-tight uppercase">
                                        {user.role === 'GUEST' ? '访客模式 · 仅浏览' : user.is_admin ? '馆长：' + (user.account || '') : (user.phone || user.account || '')}
                                    </p>
                                </div>
                            </div>
                            <button onClick={onLogout}
                                    className={`w-full py-3 rounded-xl text-xs font-bold transition-colors flex items-center justify-center gap-2 ${user.role === 'GUEST' ? 'bg-white border border-[#d4c5b2] text-[#8b7355] hover:bg-[#faf6f0]' : 'bg-white border border-red-100 text-red-500 hover:bg-red-50'}`}>
                                <Icon name={user.role === 'GUEST' ? 'log-in' : 'log-out'} size={14} /> {user.role === 'GUEST' ? '登录 / 注册' : '安全登出'}
                            </button>
                        </div>
                    </aside>

                    <main className={`flex-1 overflow-y-auto overflow-x-hidden bg-[#faf6f0] p-4 sm:p-8 lg:p-12 max-w-full box-border transition-all duration-300 ${sidebarOpen ? 'max-lg:pl-72' : ''}`}>
                        {view === 'reader_home' && <ReaderHome db={db} setView={setView} user={user} />}
                        {view === 'admin_home' && <AdminHome db={db} user={user} />}
                        {view === 'search' && <SearchView books={filteredBooks} onBorrow={borrowBook} search={search} setSearch={setSearch} user={user} deleteBook={deleteBook} onEditBook={handleEditBook} onToggleBookHide={handleToggleBookHide} />}
                        {view === 'my' && <MyBorrowings db={db} user={user} />}
                        {view === 'add' && <AddBook editBook={editingBook} onSaved={() => { setEditingBook(null); }} />}
                        {view === 'users' && <UsersManagement db={db} setDb={setDb} user={user} />}
                        {view === 'eval_admin' && <EvaluationsManager user={user} />}
                        {view === 'eval_form' && <BookEvaluation user={user} />}
                    </main>
                </div>
            );
        }

        // ======================== ReaderHome ========================
        function ReaderHome({ db, setView, user }) {
            const myBorrows = db.borrowings.filter(b => b.userId === user.id && b.status === 'BORROWED').length;
            const limit = READER_TYPES[user.readerType || 'UNDERGRAD']?.limit || 5;
            return (
                <div className="animate-in max-w-6xl mx-auto">
                    <div className="bg-gradient-to-br from-[#2c1810] to-[#4a2c1a] p-6 sm:p-8 lg:p-12 rounded-[3rem] text-white relative overflow-hidden mb-6 sm:mb-12 shadow-2xl shadow-[#2c1810]/20">
                        <div className="relative z-10 flex justify-between items-center">
                            <div>
                                <h2 className="text-4xl font-black mb-4 tracking-tighter" style={{ fontFamily: 'serif' }}>
                                    {user.role === 'GUEST' ? '游客朋友，欢迎来访' : `${user.name} 同学，展卷安好`}
                                </h2>
                                <p className="text-[#b8a99a] max-w-md leading-relaxed font-medium">
                                    {user.role === 'GUEST'
                                        ? '"书卷多情似故人，晨昏忧乐每相亲。" 登录后即可借阅馆藏。'
                                        : `"书卷多情似故人，晨昏忧乐每相亲。" 您当前的借阅额度为 ${myBorrows} / ${limit} 本。`
                                    }
                                </p>
                                <button onClick={() => setView('search')}
                                        className="mt-8 px-8 py-3 bg-white text-[#2c1810] rounded-xl font-bold text-sm hover:scale-105 transition-transform flex items-center gap-2">
                                    <Icon name="search" size={16} /> 立即探索馆藏
                                </button>
                            </div>
                            <div className="hidden lg:block text-right pr-10">
                                <div className="text-6xl font-black text-white/20 mb-2">{new Date().getDate()}</div>
                                <div className="text-xl font-bold text-white/60">{new Date().toLocaleString('zh-CN', { month: 'long', weekday: 'long' })}</div>
                            </div>
                        </div>
                        <Icon name="book-open" size={240} className="absolute right-[-40px] bottom-[-60px] opacity-10 rotate-[-15deg]" />
                    </div>

                    <div className="flex items-center justify-between mb-8 px-2">
                        <h3 className="text-2xl font-black flex items-center gap-3 text-[#2c1810]" style={{ fontFamily: 'serif' }}>
                            <div className="w-2 h-8 bg-[#b22222] rounded-full shadow-lg shadow-[#b22222]/20"></div>
                            新书速递
                        </h3>
                        <button onClick={() => setView('search')} className="text-sm font-bold text-[#8b7355] hover:text-[#2c1810]">查看全部图书 →</button>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        {db.books.slice(0, 5).map(b => (
                            <div key={b.id} onClick={() => setView('search')}
                                 className="book-card bg-white p-4 rounded-3xl border border-[#d4c5b2]/30 transition-all cursor-pointer group">
                                <div className="relative overflow-hidden rounded-2xl mb-4 shadow-sm group-hover:shadow-lg transition-all aspect-[3/4]">
                                    <img src={b.cover} className="w-full h-full object-cover" />

        // ======================== ReaderManagement ========================
        function UsersManagement({ db, setDb, user }) {
            // 权限校验
            if (!user || !user.is_admin) {
                return (
                    <div className="animate-in max-w-4xl mx-auto text-center py-20">
                        <div className="w-16 h-16 mx-auto mb-5 rounded-full bg-[#fef2f2] flex items-center justify-center text-[#b22222]">
                            <Icon name="shield-alert" size={28} />
                        </div>

                        <p className="text-[#8b7355] text-sm">此视图仅对馆长开放</p>
                    </div>
                );
            }

            const [searchTerm, setSearchTerm] = useState('');
            const [readers, setReaders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [editingUser, setEditingUser] = useState(null);
            const [showForm, setShowForm] = useState(false);
            const [credentialModal, setCredentialModal] = useState(null);
            const [resetPwModal, setResetPwModal] = useState(null);
            const [resetPwValue, setResetPwValue] = useState('');
            const [resetPwMsg, setResetPwMsg] = useState(null);
            const [readerEvalModal, setReaderEvalModal] = useState(null);
            const [readerEvals, setReaderEvals] = useState([]);
            const [readerEvalsLoading, setReaderEvalsLoading] = useState(false);

            // 基于时间顺序的动态编号（由旧到新 #0001 开始）
            const readerEvalNumberMap = React.useMemo(() => {
                const sorted = [...readerEvals].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                return new Map(sorted.map((e, i) => [e.id, i + 1]));
            }, [readerEvals]);

            // 从 Supabase 加载读者数据
            const fetchReaders = async () => {
                setLoading(true);
                // 优先从 readers 表加载（新系统）
                const { data, error } = await supabase
                    .from('readers')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (!error && data && data.length > 0) {
                    setReaders(data);
                    setLoading(false);
                    return;
                }
                // 若 readers 表为空或不存在，降级尝试从 profiles 表加载（旧系统兼容）
                const { data: profiles, error: profilesErr } = await supabase
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (!profilesErr && profiles && profiles.length > 0) {
                    setReaders(profiles.map(p => ({
                        id: p.id,
                        email: p.email || p.phone || '',
                        name: p.name || '',
                        department: p.department || '未知院系',
                        reader_type: p.reader_type || 'UNDERGRAD',
                        role: p.role || 'READER',
                        status: p.status || 'ACTIVE',
                        is_admin: p.is_admin || false,
                        created_at: p.created_at || null,
                    })));
                }
                setLoading(false);
            };

            useEffect(() => { fetchReaders(); }, []);

            // 动态搜索（姓名、邮箱）
            const filteredReaders = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return readers.filter(r =>
                    (r.name || '').toLowerCase().includes(term) ||
                    (r.email || '').toLowerCase().includes(term)
                );
            }, [readers, searchTerm]);

            // 切换状态
            const toggleStatus = async (r) => {
                const newStatus = r.status === 'ACTIVE' ? 'FROZEN' : 'ACTIVE';
                if (!confirm(`确定要${newStatus === 'FROZEN' ? '冻结' : '激活'}读者 ${r.name} 吗？`)) return;
                const { error } = await supabase.from('readers').update({ status: newStatus }).eq('id', r.id);
                if (error) { alert('状态更新失败: ' + error.message); return; }
                setReaders(prev => prev.map(x => x.id === r.id ? { ...x, status: newStatus } : x));
            };

            // 保存读者信息（编辑/新增）
            const handleSaveForm = async (formData) => {
                if (editingUser) {
                    const { error } = await supabase.from('readers').update({
                        name: formData.name,
                        department: formData.department,
                    }).eq('id', editingUser.id);
                    if (error) { alert('更新失败: ' + error.message); return; }
                    setReaders(prev => prev.map(x => x.id === editingUser.id ? { ...x, name: formData.name, department: formData.department } : x));
                } else {
                    alert('新增读者请通过注册页面完成，或直接在 Supabase 控制台操作。');
                }
                setShowForm(false); setEditingUser(null);
            };

            // 重置密码
            const handleResetPassword = async (reader) => {
                if (!resetPwValue || resetPwValue.length < 6) return setResetPwMsg('密码至少 6 位');
                setResetPwMsg(null);
                try {
                    const { error } = await supabase.functions.invoke('reset-password', {
                        body: { userId: reader.id, newPassword: resetPwValue }
                    });
                    if (error) { setResetPwMsg('重置失败: ' + error.message); return; }
                    alert(`密码已重置为: ${resetPwValue}\n请告知用户使用新密码登录。`);
                    setResetPwModal(null); setResetPwValue(''); setResetPwMsg(null);
                } catch (e) {
                    setResetPwMsg('网络异常: ' + e.message);
                }
            };

            // 导出 CSV
            const exportCSV = () => {
                const headers = ["邮箱", "姓名", "院系", "状态", "注册时间"];
                const rows = filteredReaders.map(r => [
                    r.email, r.name, r.department,
                    r.status === 'ACTIVE' ? '正常' : '冻结',
                    r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN') : ''
                ]);
                const csvContent = "data:text/csv;charset=utf-8,﻿" + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `读者名册_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            // 借阅统计辅助
            const getBorrowStats = (readerId) => {
                const all = db.borrowings.filter(b => b.userId === readerId);
                const current = all.filter(b => b.status === 'BORROWED').length;
                return { current, total: all.length };
            };

            return (

                    <div className="flex justify-between items-end mb-8">

                            <h2 className="text-3xl font-black text-[#2c1810]" style={{ fontFamily: 'serif' }}>读者信息管理</h2>
                            <p className="text-[#8b7355] text-sm mt-2">

                            </p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={exportCSV} className="px-5 py-2.5 bg-white border border-[#d4c5b2]/30 text-[#8b7355] rounded-xl font-bold text-sm hover:bg-[#faf6f0] transition-all flex items-center gap-2 shadow-sm">
                                <Icon name="download" size={16} /> 导出名单
                            </button>
                            <button onClick={() => { setEditingUser(null); setShowForm(true); }}
                                    className="px-5 py-2.5 bg-gradient-to-r from-[#b22222] to-[#8b1a1a] text-white rounded-xl font-bold text-sm shadow-lg shadow-[#b22222]/20 hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                                <Icon name="user-plus" size={16} /> 新增读者
                            </button>
                        </div>
                    </div>

                    {!loading && readers.length === 0 && (
                        <div className="mb-4 p-4 bg-amber-50 border border-amber-200 rounded-2xl text-sm text-amber-800 flex items-center justify-between">
                            <span>📭 暂无读者数据 — 需要先在 Supabase SQL Editor 执行 <code className="px-1.5 py-0.5 bg-amber-100 rounded text-xs font-mono">sql/readers.sql</code> 创建表</span>
                            <button onClick={() => { setLoading(true); fetchReaders(); }}
                                    className="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-xl text-xs font-bold transition-colors">
                                重新加载
                            </button>
                        </div>
                    )}

                    <div className="bg-white rounded-[2rem] border border-[#d4c5b2]/30 shadow-sm overflow-hidden">
                        <div className="p-4 border-b border-[#d4c5b2]/20 flex items-center gap-4 bg-[#faf6f0]/50">
                            <div className="relative flex-1 max-w-md">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-[#8b7355]" />
                                <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                       placeholder="搜索姓名、邮箱…"
                                       className="w-full pl-10 pr-4 py-2 bg-white rounded-lg border border-[#d4c5b2]/30 shadow-sm focus:ring-2 ring-[#8b4513]/20 outline-none text-sm transition-all text-[#2c1810]" />
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-[#faf6f0] text-[11px] font-black text-[#8b7355] uppercase tracking-widest border-b border-[#d4c5b2]/20">

                                    </tr>

                                <tbody className="divide-y divide-[#d4c5b2]/10">

        // ======================== UserFormModal ========================

                        <div className="flex gap-3 mt-8">
